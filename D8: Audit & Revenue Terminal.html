<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" href="https://mohammad3230.github.io/PROJECT/favicon.png" type="image/png" sizes="32x32" />
<script async src="https://www.googletagmanager.com/gtag/js?id=GT-NC6T5LRJ"></script>
<script>

  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'GT-NC6T5LRJ');

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NHAI - Audit & Revenue Terminal</title>
<style>
    :root { --bg: #0a0508; --panel: #101018; --accent: #00f2ff; --success: #2ed573; --danger: #ff0044; --warning: #ffa502; --border: #2a1a2a; }
    body { background-color: var(--bg); color: #ccc; font-family: 'Courier New', monospace; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    .top-bar { background: #000; padding: 15px 20px; border-bottom: 2px solid var(--success); display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
    .top-bar h1 { margin: 0; font-size: 1rem; color: var(--success); letter-spacing: 1px; text-shadow: 0 0 10px rgba(46,213,115,0.5); }
    .top-bar .time { color: var(--warning); font-size: 0.9rem; }
    .main-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 20px; flex-grow: 1; min-height: 0; overflow: hidden; }
    .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 4px; padding: 20px; display: flex; flex-direction: column; overflow: hidden; }
    .panel-title { color: var(--success); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; border-bottom: 1px solid var(--border); padding-bottom: 10px; flex-shrink: 0; }
    .stat-row { display: flex; gap: 15px; margin-bottom: 20px; flex-shrink: 0; }
    .stat-box { flex: 1; background: #000; border: 1px solid var(--border); padding: 15px; border-radius: 4px; text-align: center; border-top: 3px solid var(--success); }
    .stat-box.toll-rev { border-top-color: var(--warning); }
    .stat-box.arrest-rev { border-top-color: var(--danger); }
    .stat-num { font-size: 2rem; font-weight: 900; margin-bottom: 5px; }
    .stat-label { font-size: 0.75rem; color: #888; text-transform: uppercase; }
    .breakdown-list { flex-grow: 1; overflow-y: auto; padding-right: 5px; }
    .breakdown-item { background: #000; border: 1px solid var(--border); padding: 12px; margin-bottom: 8px; border-left: 4px solid var(--success); border-radius: 4px; font-size: 0.85rem; }
    .breakdown-item.toll { border-left-color: var(--warning); }
    .breakdown-item.arrest { border-left-color: var(--danger); }
    .mech-btn { width: 100%; padding: 15px; border: 2px solid #000; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 0.9rem; box-shadow: 0 4px 0 #000; transition: all 0.1s; font-family: monospace; border-radius: 4px; margin-top: 15px; flex-shrink: 0; }
    .mech-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #000; }
    .btn-cashout { background: linear-gradient(145deg, #2ed573, #1e9e55); color: #fff; }
    .btn-reset { background: #333; color: #fff; }
    .breakdown-list::-webkit-scrollbar { width: 6px; }
    .breakdown-list::-webkit-scrollbar-track { background: #000; border: 1px solid var(--border); }
    .breakdown-list::-webkit-scrollbar-thumb { background: var(--success); border: 1px solid #000; }
    .log-box { flex: 1; background: #000; border: 1px solid #222; padding: 10px; font-size: 0.7rem; color: var(--success); overflow-y: auto; border-radius: 4px; min-height: 0; }
    @media (max-width: 1024px) { .main-layout { grid-template-columns: 1fr; overflow-y: auto; } }
    @media (max-width: 600px) { .top-bar h1 { font-size: 0.7rem; } .main-layout { padding: 10px; gap: 15px; } .stat-row { flex-direction: column; } }
</style>
</head>
<body>
<div class="top-bar">
    <h1>▸ NHAI_AUDIT // REVENUE_TERMINAL_v9.0</h1>
    <div class="time" id="clock">00:00:00</div>
</div>
<div class="main-layout">
    <div class="panel">
        <div class="panel-title">■ Financial Overview</div>
        <div class="stat-row">
            <div class="stat-box"><div class="stat-num" style="color:var(--success);" id="stat-total">$0</div><div class="stat-label">Total Network Rev</div></div>
            <div class="stat-box toll-rev"><div class="stat-num" style="color:var(--warning);" id="stat-tolls">$0</div><div class="stat-label">Toll & NHAI Rev</div></div>
            <div class="stat-box arrest-rev"><div class="stat-num" style="color:var(--danger);" id="stat-bounties">$0</div><div class="stat-label">Bounty & Fee Rev</div></div>
        </div>
        <div style="color: #555; font-size: 0.75rem; margin-bottom: 10px;">Recent Transactions</div>
        <div class="breakdown-list" id="trans-list"><div style="color:#555; text-align:center; padding:20px;">NO TRANSACTIONS</div></div>
        <button class="mech-btn btn-cashout" onclick="cashOut()">END OF DAY CASH OUT</button>
    </div>
    <div class="panel">
        <div class="panel-title">■ Officer Performance Audit</div>
        <div class="stat-row">
            <div class="stat-box"><div class="stat-num" style="color:var(--accent);" id="stat-valids">0</div><div class="stat-label">Valid Actions</div></div>
            <div class="stat-box"><div class="stat-num" style="color:var(--danger);" id="stat-misses">0</div><div class="stat-label">Security Breaches</div></div>
        </div>
        <div style="color: #555; font-size: 0.75rem; margin-bottom: 10px;">Audit Log</div>
        <div class="log-box" id="audit-log"></div>
        <button class="mech-btn btn-reset" onclick="resetLedger()">RESET LEDGER</button>
    </div>
</div>
<script>
    const LS_D1_KEY = 'enforcementTerminalV23_D1'; const LS_D2_KEY = 'enforcementTerminalV23_TOLL';
    let sharedData = { revenue: 0, valids: 0, missed: 0, level: 1, rankPoints: 0, history: [], registry: {}, forgedAliases: {}, nextSpawnOverride: null, activeInmates: [], releasedInmates: [], ledgerCashouts: [], intelFlags: [], paroleRecords: [], iaViolations: [], rehabPrograms: [] };
    function updateClock() { document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB'); } setInterval(updateClock, 1000);
    function deepMerge(target, source) { for (const key in source) { if (source[key] instanceof Array) { target[key] = source[key]; } else if (source[key] instanceof Object && target[key] instanceof Object) { deepMerge(target[key], source[key]); } else { target[key] = source[key]; } } return target; }
    function loadData() {
        try { const d1 = localStorage.getItem(LS_D1_KEY); const d2 = localStorage.getItem(LS_D2_KEY); sharedData = { history: [], ledgerCashouts: [], iaViolations: [] };
            if (d1) { const p = JSON.parse(d1); deepMerge(sharedData, p); if(p.registry) Object.assign(sharedData.registry, p.registry); }
            if (d2) { const p = JSON.parse(d2); deepMerge(sharedData, p); if(p.registry) Object.assign(sharedData.registry, p.registry); if(p.history) sharedData.history = p.history.concat(sharedData.history).filter((v, i, a) => a.findIndex(t => (t.plate === v.plate && t.timestamp === v.timestamp)) === i); }
            if(!sharedData.history) sharedData.history = []; if(!sharedData.ledgerCashouts) sharedData.ledgerCashouts = []; if(!sharedData.iaViolations) sharedData.iaViolations = [];
        } catch(e) {} renderDashboard();
    }
    function saveData() { try { const d = JSON.stringify(sharedData); localStorage.setItem(LS_D1_KEY, d); localStorage.setItem(LS_D2_KEY, d); } catch(e) {} }
    function addAuditLog(msg, color) { const log = document.getElementById('audit-log'); const entry = document.createElement('div'); entry.style.color = color || "var(--success)"; entry.style.marginBottom = "5px"; entry.innerText = `> ${msg}`; log.prepend(entry); if(!sharedData.iaViolations) sharedData.iaViolations = []; sharedData.iaViolations.push({ message: msg, color: color, timestamp: new Date().toLocaleString() }); saveData(); }
    function cashOut() { loadData(); if(sharedData.revenue === 0) return; const currentRev = sharedData.revenue; sharedData.ledgerCashouts.push({ date: new Date().toLocaleString(), totalCashOut: currentRev }); sharedData.revenue = 0; saveData(); loadData(); addAuditLog(`CASH OUT: $${currentRev} deposited to Federal Reserve.`, "var(--success)"); }
    function resetLedger() { loadData(); if(sharedData.revenue > 0) { addAuditLog("ERROR: Must Cash Out before resetting ledger.", "var(--danger)"); return; } sharedData.valids = 0; sharedData.missed = 0; sharedData.rankPoints = 0; sharedData.level = 1; saveData(); loadData(); addAuditLog("AUDIT: Performance Ledger Reset.", "var(--warning)"); }
    function renderDashboard() {
        document.getElementById('stat-total').innerText = `$${sharedData.revenue || 0}`; document.getElementById('stat-valids').innerText = sharedData.valids || 0; document.getElementById('stat-misses').innerText = sharedData.missed || 0;
        let tollRev = 0, arrestRev = 0; (sharedData.history || []).forEach(h => { if(h.action.includes("TOLL PAID")) tollRev += 500; else if(h.action.includes("ROGUE TOLL")) tollRev += 1000; else if(h.action.includes("LICENSE APPROVED") || h.action === "RELEASED") tollRev += 50; else if(h.action === "ARRESTED" || h.action.includes("ARREST STAMPED")) arrestRev += 200; else if(h.action === "ID RENEWED") arrestRev += 150; else if(h.action === "REHAB GRADUATED") arrestRev += 100; else if(h.action === "PAROLE GRANTED" || h.action.includes("PAROLE / RELEASED")) arrestRev += 50; });
        document.getElementById('stat-tolls').innerText = `$${tollRev}`; document.getElementById('stat-bounties').innerText = `$${arrestRev}`;
        const listContainer = document.getElementById('trans-list'); listContainer.innerHTML = ''; const recentHistory = (sharedData.history || []).slice(-15).reverse();
        if (recentHistory.length === 0 && (sharedData.ledgerCashouts || []).length === 0) { listContainer.innerHTML = '<div style="color:#555; text-align:center; padding:20px;">NO TRANSACTIONS</div>'; } else {
            (sharedData.ledgerCashouts || []).slice(-3).reverse().forEach(co => { const item = document.createElement('div'); item.className = 'breakdown-item'; item.innerHTML = `<div style="display:flex; justify-content:space-between; font-weight:bold; color:var(--success);"><span>CASH OUT DEPOSIT</span> <span>$${co.totalCashOut}</span></div><div style="font-size:0.7rem; color:#555; margin-top:4px;">${co.date}</div>`; listContainer.appendChild(item); });
            recentHistory.forEach(h => { const item = document.createElement('div'); let cssClass = 'breakdown-item penalty'; let amountText = '$0'; if(h.action.includes("TOLL PAID")) { cssClass = 'toll'; amountText = 'Toll Paid'; } else if(h.action.includes("ROGUE TOLL")) { cssClass = 'toll'; amountText = 'Rogue Fine'; } else if(h.action.includes("LICENSE APPROVED") || h.action === "RELEASED") { cssClass = 'toll'; amountText = '+$50 Fee'; } else if(h.action === "ARRESTED" || h.action.includes("ARREST STAMPED")) { cssClass = 'arrest'; amountText = '+$200 Bounty'; } else if(h.action === "ID RENEWED") { cssClass = 'penalty'; amountText = '+$150 ID Fee'; } else if(h.action === "REHAB GRADUATED") { cssClass = 'penalty'; amountText = '+$100 Rehab Fee'; } else if(h.action === "PAROLE GRANTED" || h.action.includes("PAROLE / RELEASED")) { cssClass = 'penalty'; amountText = '+$50 Parole Fee'; } item.className = `breakdown-item ${cssClass}`; item.innerHTML = `<div style="display:flex; justify-content:space-between;"><span style="color:var(--warning); font-weight:bold;">${h.plate}</span><span style="font-weight:bold;">${amountText}</span></div><div style="font-size:0.7rem; color:#555; margin-top:4px;">${h.action} @ ${h.timestamp || 'N/A'}</div>`; listContainer.appendChild(item); });
        }
        const auditLog = document.getElementById('audit-log'); auditLog.innerHTML = ''; const violations = (sharedData.iaViolations || []).slice(-30).reverse();
        if (violations.length === 0) { auditLog.innerHTML = '<div style="color:#555;">No audits recorded yet.</div>'; } else { violations.forEach(v => { const entry = document.createElement('div'); entry.style.color = v.color || "var(--success)"; entry.style.marginBottom = "5px"; entry.innerText = `> ${v.message}`; auditLog.appendChild(entry); }); }
    }
    loadData(); setInterval(loadData, 2000);
</script>
</body>
</html>
