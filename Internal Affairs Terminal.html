<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" href="https://mohammad3230.github.io/PROJECT/favicon.png" type="image/png" sizes="32x32" />
<script async src="https://www.googletagmanager.com/gtag/js?id=GT-NC6T5LRJ"></script>
<script>
window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','GT-NC6T5LRJ');
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NHAI - Internal Affairs Terminal</title>
<style>
:root{--bg:#0a0508;--panel:#101018;--accent:#ff0044;--success:#2ed573;--danger:#ff4757;--warning:#ffa502;--border:#2a1a2a;}
body{background:var(--bg);color:#ccc;font-family:'Courier New',monospace;margin:0;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
.top-bar{background:#000;padding:15px 20px;border-bottom:2px solid var(--danger);display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
.top-bar h1{margin:0;font-size:.9rem;color:var(--danger);letter-spacing:1px;text-shadow:0 0 10px rgba(255,0,68,.5);}
.top-bar .time{color:var(--warning);font-size:.8rem;}
.main-layout{display:grid;grid-template-columns:1fr 1fr;gap:20px;padding:20px;flex-grow:1;min-height:0;overflow:hidden;}
.panel{background:var(--panel);border:1px solid var(--border);border-radius:4px;padding:20px;display:flex;flex-direction:column;overflow:hidden;}
.panel-title{color:var(--danger);font-size:.85rem;text-transform:uppercase;letter-spacing:1px;margin-bottom:15px;border-bottom:1px solid var(--border);padding-bottom:10px;flex-shrink:0;}
.integrity-meter{background:#000;border:1px solid var(--border);border-radius:4px;padding:20px;text-align:center;margin-bottom:20px;flex-shrink:0;}
.integrity-score{font-size:4rem;font-weight:900;}
.integrity-bar{width:100%;height:8px;background:#333;border-radius:4px;margin-top:10px;overflow:hidden;}
.integrity-fill{height:100%;border-radius:4px;transition:width .5s;}
.stat-row{display:flex;gap:12px;margin-bottom:15px;flex-shrink:0;}
.stat-box{flex:1;background:#000;border:1px solid var(--border);padding:12px;border-radius:4px;text-align:center;}
.stat-num{font-size:1.5rem;font-weight:900;margin-bottom:3px;}
.stat-label{font-size:.65rem;color:#888;text-transform:uppercase;}
.violation-list{flex-grow:1;overflow-y:auto;padding-right:5px;min-height:0;}
.violation-item{background:#000;border:1px solid var(--border);padding:12px;margin-bottom:8px;border-left:4px solid var(--danger);border-radius:4px;font-size:.8rem;}
.violation-item.minor{border-left-color:var(--warning);}
.violation-item.major{border-left-color:var(--danger);}
.log-box{flex:1;background:#000;border:1px solid #222;padding:10px;font-size:.7rem;color:var(--danger);overflow-y:auto;border-radius:4px;min-height:0;}
.violation-list::-webkit-scrollbar,.log-box::-webkit-scrollbar{width:6px;}
.violation-list::-webkit-scrollbar-track,.log-box::-webkit-scrollbar-track{background:#000;border:1px solid var(--border);}
.violation-list::-webkit-scrollbar-thumb,.log-box::-webkit-scrollbar-thumb{background:var(--danger);}
.mech-btn{width:100%;padding:12px;border:2px solid #000;cursor:pointer;font-weight:bold;text-transform:uppercase;font-size:.8rem;box-shadow:0 3px 0 #000;transition:all .1s;font-family:monospace;border-radius:4px;margin-top:10px;flex-shrink:0;background:var(--danger);color:#fff;}
.mech-btn:active{transform:translateY(2px);box-shadow:0 1px 0 #000;}
@media(max-width:1024px){.main-layout{grid-template-columns:1fr;overflow-y:auto;}}
@media(max-width:600px){.top-bar h1{font-size:.7rem;}.integrity-score{font-size:3rem;}}
</style>
</head>
<body>
<div class="top-bar">
<h1>▸ NHAI_IAFFAIRS // INTERNAL_TERMINAL_v14.1</h1>
<div class="time" id="clock">00:00:00</div>
</div>
<div class="main-layout">
<div class="panel">
<div class="panel-title">■ Officer Integrity Score</div>
<div class="integrity-meter">
<div class="integrity-score" id="integrity-score">100</div>
<div style="font-size:.75rem;color:#888;">INTEGRITY RATING</div>
<div class="integrity-bar"><div class="integrity-fill" id="integrity-fill" style="width:100%;background:var(--success);"></div></div>
</div>
<div class="stat-row">
<div class="stat-box"><div class="stat-num" style="color:var(--success)" id="s-valid">0</div><div class="stat-label">Valid Actions</div></div>
<div class="stat-box"><div class="stat-num" style="color:var(--danger)" id="s-breaches">0</div><div class="stat-label">Breaches</div></div>
<div class="stat-box"><div class="stat-num" style="color:var(--warning)" id="s-suspect">0</div><div class="stat-label">Suspicious</div></div>
</div>
<div class="violation-list" id="violation-list"><div style="color:#555;text-align:center;padding:20px;">NO VIOLATIONS</div></div>
<button class="mech-btn" onclick="runAudit()">RUN FULL AUDIT</button>
</div>
<div class="panel">
<div class="panel-title">■ Investigation Log</div>
<div class="log-box" id="ia-log"></div>
</div>
</div>
<script>
let sharedData = { 
    revenue: 0, valids: 0, missed: 0, level: 1, rankPoints: 0, 
    history: [], registry: {}, forgedAliases: {}, nextSpawnOverride: null,
    activeInmates: [], releasedInmates: [], inbox: [], sentMail: [], call911Logs: [],
    ledgerCashouts: [], intelFlags: [], paroleRecords: [], iaViolations: [], rehabPrograms: []
};

let saveTimeout = null;

function updateClock(){document.getElementById('clock').textContent=new Date().toLocaleTimeString('en-GB');}
setInterval(updateClock,1000);

// Upgraded to SHA-256 Web Crypto API for un-feasible-to-reverse localStorage signatures
async function generateSignature(dataStr) {
    const msgBuffer = new TextEncoder().encode(dataStr);
    const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}

function ensureDataStructure(data) {
    const defaults = {
        history: [], registry: {}, forgedAliases: {}, nextSpawnOverride: null,
        activeInmates: [], releasedInmates: [], inbox: [], sentMail: [], call911Logs: [],
        ledgerCashouts: [], intelFlags: [], paroleRecords: [], iaViolations: [], rehabPrograms: []
    };
    for (const key in defaults) {
        if (!data.hasOwnProperty(key)) {
            data[key] = defaults[key];
        }
    }
    return data;
}

async function loadData(){
    const savedData = localStorage.getItem('enforcementTerminalV23');
    const savedSig = localStorage.getItem('enforcementTerminalV23_sig');
    if(savedData){
        try {
            const currentSig = await generateSignature(savedData);
            if(savedSig !== currentSig){
                console.error("IA BREACH: Data tampering detected! Wiping corrupted data.");
                localStorage.removeItem('enforcementTerminalV23');
                localStorage.removeItem('enforcementTerminalV23_sig');
                renderDashboard();
                renderLogs();
                return;
            }
            const p = JSON.parse(savedData);
            sharedData = ensureDataStructure(p);
        } catch(e) {
            console.error("Load error:", e);
        }
    }
    renderDashboard();
    renderLogs();
}

function debounceSave(){
    if(saveTimeout) clearTimeout(saveTimeout);
    saveTimeout = setTimeout(async () => {
        const dataStr = JSON.stringify(sharedData);
        localStorage.setItem('enforcementTerminalV23', dataStr);
        const sig = await generateSignature(dataStr);
        localStorage.setItem('enforcementTerminalV23_sig', sig);
    }, 500); // Sync 500ms after the last modification
}

function addLog(msg, color){
    const l = document.getElementById('ia-log');
    const e = document.createElement('div');
    e.style.color = color || 'var(--danger)';
    e.style.marginBottom = '5px';
    e.textContent = '> ' + msg; // Security: textContent prevents XSS
    l.prepend(e);

    // Persist logs safely
    if(!sharedData.iaViolations) sharedData.iaViolations = [];
    sharedData.iaViolations.push({
        plate: "IA_SYSTEM",
        type: "LOG",
        message: msg,
        color: color,
        time: new Date().toLocaleTimeString(),
        status: "LOGGED"
    });
    debounceSave();
}

function renderLogs(){
    const l = document.getElementById('ia-log');
    l.innerHTML = ''; // Safe to clear container
    const logs = (sharedData.iaViolations||[]).filter(f => f.plate === 'IA_SYSTEM' && f.type === 'LOG').slice(-30).reverse();
    
    if(logs.length === 0){
        const placeholder = document.createElement('div');
        placeholder.style.color = '#555';
        placeholder.textContent = 'No investigation logs recorded yet.';
        l.appendChild(placeholder);
    } else {
        logs.forEach(log => {
            const e = document.createElement('div');
            e.style.color = log.color || 'var(--danger)';
            e.style.marginBottom = '5px';
            e.textContent = '> ' + log.message; // Security: textContent prevents XSS
            l.appendChild(e);
        });
    }
}

function createViolationElement(v) {
    const d = document.createElement('div');
    d.className = 'violation-item ' + (v.severity || 'minor');
    
    const headerDiv = document.createElement('div');
    headerDiv.style.display = 'flex';
    headerDiv.style.justifyContent = 'space-between';
    
    const typeSpan = document.createElement('span');
    typeSpan.style.color = v.severity === 'major' ? 'var(--danger)' : 'var(--warning)';
    typeSpan.style.fontWeight = 'bold';
    typeSpan.textContent = v.type; // Security: textContent prevents XSS
    
    const timeSpan = document.createElement('span');
    timeSpan.style.color = '#555';
    timeSpan.textContent = v.time || 'N/A'; // Security: textContent prevents XSS
    
    headerDiv.appendChild(typeSpan);
    headerDiv.appendChild(timeSpan);
    
    const detailDiv = document.createElement('div');
    detailDiv.style.fontSize = '.7rem';
    detailDiv.style.color = '#888';
    detailDiv.style.marginTop = '4px';
    detailDiv.textContent = (v.plate || 'SYS') + ' — ' + (v.detail || ''); // Security: textContent prevents XSS
    
    d.appendChild(headerDiv);
    d.appendChild(detailDiv);
    return d;
}

function runAudit(){
    const hist = sharedData.history || [];
    const reg = sharedData.registry || {};
    const aliases = sharedData.forgedAliases || {};
    let violations = [];
    let suspicious = 0; // Fixed: Changed from const to let to allow suspicious++
    
    const forgedPlates = Object.keys(aliases);

    hist.forEach(h => {
        if(h.action==='ARRESTED' && h.plate!=='UNKNOWN' && !h.plate.startsWith('HOLD-')){
            if(reg[h.plate] && reg[h.plate].status==='CLEAR'){
                violations.push({type:'WRONGFUL ARREST', plate:h.plate, severity:'major', time:h.timestamp, detail:'Arrested a CLEAR citizen'});
            }
        }
        if(h.action==='RELEASED' || (h.action && h.action.includes('PAROLE / RELEASED'))){
            if(forgedPlates.includes(h.plate)){
                violations.push({type:'CORRUPT RELEASE', plate:h.plate, severity:'major', time:h.timestamp, detail:'Released a known forged alias'});
                suspicious++;
            }
            const histForPlate = hist.filter(x => x.plate === h.plate);
            const wasArrested = histForPlate.some(x => x.action.includes('ARRESTED'));
            const currentReg = reg[h.plate];
            
            if(wasArrested && currentReg && currentReg.status === 'CLEAR' && currentReg.registeredBy === 'PAROLE_BOARD') {
                // Valid parole
            } else if (wasArrested && !currentReg) {
                violations.push({type:'ILLEGAL RELEASE', plate:h.plate, severity:'major', time:h.timestamp, detail:'Released subject without updating registry'});
                suspicious++;
            }
        }
        if(h.action==='LICENSE APPROVED'){
            if(forgedPlates.includes(h.plate)){
                violations.push({type:'CORRUPT LICENSING', plate:h.plate, severity:'major', time:h.timestamp, detail:'Approved license for known forged alias'});
                suspicious++;
            }
        }
    });

    Object.keys(reg).forEach(plate => {
        if(reg[plate].registeredBy==='SYNDICATE_FORGE'){
            const tollPass = hist.find(h => h.plate===plate && h.action && h.action.includes('TOLL'));
            if(tollPass){
                violations.push({type:'TOLL BYPASS ASSIST', plate:plate, severity:'minor', time:tollPass.timestamp, detail:'Forged vehicle passed toll without flag'});
                suspicious++;
            }
        }
    });

    // Keep logs, merge new audit violations
    const existingLogs = (sharedData.iaViolations||[]).filter(v => v.type === 'LOG');
    sharedData.iaViolations = [...existingLogs, ...violations];
    debounceSave();

    const validActions = sharedData.valids || 0;
    const breaches = sharedData.missed || 0;
    const integrity = Math.max(0, 100 - (breaches*5) - (violations.filter(v=>v.severity==='major').length*10) - (suspicious*3));
    
    document.getElementById('integrity-score').textContent = integrity;
    const fill = document.getElementById('integrity-fill');
    fill.style.width = integrity + '%';
    fill.style.background = integrity > 70 ? 'var(--success)' : integrity > 40 ? 'var(--warning)' : 'var(--danger)';
    
    document.getElementById('s-valid').textContent = validActions;
    document.getElementById('s-breaches').textContent = breaches;
    document.getElementById('s-suspect').textContent = suspicious;

    const list = document.getElementById('violation-list');
    list.innerHTML = '';
    
    if(violations.length === 0){
        const cleanMsg = document.createElement('div');
        cleanMsg.style.color = 'var(--success)';
        cleanMsg.style.textAlign = 'center';
        cleanMsg.style.padding = '20px';
        cleanMsg.textContent = 'NO VIOLATIONS DETECTED';
        list.appendChild(cleanMsg);
        addLog('AUDIT COMPLETE: Officer conduct is clean.','var(--success)');
        return;
    }

    violations.forEach(v => {
        list.appendChild(createViolationElement(v));
    });

    addLog(`AUDIT COMPLETE: ${violations.length} violations, ${suspicious} suspicious patterns. Integrity: ${integrity}%`, integrity > 70 ? 'var(--success)' : 'var(--danger)');
}

function renderDashboard(){
    const v = (sharedData.iaViolations||[]).filter(x => x.type !== 'LOG');
    const b = sharedData.missed || 0;
    const integrity = Math.max(0, 100 - (b*5) - (v.filter(x=>x.severity==='major').length*10));
    
    document.getElementById('integrity-score').textContent = integrity;
    const fill = document.getElementById('integrity-fill');
    fill.style.width = integrity + '%';
    fill.style.background = integrity > 70 ? 'var(--success)' : integrity > 40 ? 'var(--warning)' : 'var(--danger)';
    
    document.getElementById('s-valid').textContent = sharedData.valids || 0;
    document.getElementById('s-breaches').textContent = b;
    
    const list = document.getElementById('violation-list');
    list.innerHTML = '';
    
    if(v.length === 0){
        const placeholder = document.createElement('div');
        placeholder.style.color = '#555';
        placeholder.style.textAlign = 'center';
        placeholder.style.padding = '20px';
        placeholder.textContent = 'NO VIOLATIONS';
        list.appendChild(placeholder);
    } else {
        v.forEach(vi => {
            list.appendChild(createViolationElement(vi));
        });
    }
}

loadData();
setInterval(loadData, 3000); // Slowed down slightly to prevent DOM sync thrashing
</script>
</body>
</html>
