<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" href="https://mohammad3230.github.io/PROJECT/favicon.png" type="image/png" sizes="32x32" />

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#080810">
<title>NHAI - Citizen Archival Mainframe</title>
<style>
    :root {
        --bg: #080810; --panel: #0c0c18; --accent: #00d9ff; --success: #2ed573;
        --danger: #ff0044; --warning: #ffa502; --border: #1e1e30; --gold: #ffd700;
        --paper: #f0f0e8;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
        background-color: var(--bg); color: #ccc; font-family: 'Courier New', monospace;
        height: 100vh; height: 100dvh; display: flex; flex-direction: column; overflow: hidden;
        -webkit-font-smoothing: antialiased;
    }

    .app-container {
        max-width: 1400px; margin: 0 auto; width: 100%; height: 100%; display: flex; flex-direction: column; overflow: hidden;
    }

    /* TOP BAR */
    .top-bar {
        background: #000; padding: 16px 24px; border-bottom: 2px solid var(--accent); 
        display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; z-index: 10;
    }
    .top-bar h1 { font-size: clamp(0.7rem, 2.5vw, 1rem); color: var(--accent); letter-spacing: 1px; }
    .top-bar-right { display: flex; align-items: center; gap: 10px; }
    .top-bar .time { color: var(--gold); font-size: 0.9rem; font-variant-numeric: tabular-nums; }

    .sync-badge {
        font-size: 0.55rem; padding: 3px 8px; border-radius: 3px; letter-spacing: 1px; font-weight: bold; text-transform: uppercase; white-space: nowrap; transition: all 0.3s;
    }
    .sync-badge.online { background: rgba(0,255,157,0.1); color: var(--success); border: 1px solid var(--success); box-shadow: 0 0 8px rgba(46,213,115,0.2); }
    .sync-badge.offline { background: rgba(255,0,68,0.1); color: var(--danger); border: 1px solid var(--danger); box-shadow: 0 0 8px rgba(255,0,68,0.2); }
    .sync-badge.waiting { background: rgba(255,204,0,0.1); color: var(--warning); border: 1px solid var(--warning); box-shadow: 0 0 8px rgba(255,165,2,0.2); }

    /* STATS ROW */
    .stats-row {
        display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px;
        padding: 20px 24px; border-bottom: 1px solid var(--border); flex-shrink: 0; background: var(--panel);
    }
    .stat-box {
        background: #000; border: 1px solid var(--border); border-radius: 6px; padding: 16px;
        display: flex; flex-direction: column; gap: 6px; border-left: 3px solid var(--border);
    }
    .stat-box.s-total { border-left-color: var(--accent); }
    .stat-box.s-valid { border-left-color: var(--success); }
    .stat-box.s-expired { border-left-color: var(--warning); }
    .stat-box.s-flagged { border-left-color: var(--danger); }
    .stat-label { font-size: 0.7rem; color: #555; text-transform: uppercase; letter-spacing: 1px; }
    .stat-value { font-size: 1.8rem; font-weight: 900; color: #fff; font-variant-numeric: tabular-nums; }

    /* CONTROLS */
    .controls {
        display: flex; gap: 16px; padding: 20px 24px; background: var(--bg); border-bottom: 1px solid var(--border); flex-shrink: 0;
        flex-wrap: wrap; align-items: center;
    }
    .search-box {
        flex: 1; min-width: 200px; background: #000; border: 1px solid var(--border); color: #fff; padding: 12px 16px;
        font-family: monospace; font-size: 0.9rem; outline: none; border-radius: 4px; transition: border-color 0.2s;
    }
    .search-box:focus { border-color: var(--accent); }
    .search-box::placeholder { color: #333; }
    
    select.filter-select {
        background: #000; border: 1px solid var(--border); color: var(--accent); padding: 12px 16px;
        font-family: monospace; font-size: 0.9rem; outline: none; border-radius: 4px; cursor: pointer;
    }

    .btn-add {
        background: var(--accent); color: #000; border: none; padding: 12px 24px; font-weight: bold; text-transform: uppercase;
        font-family: monospace; font-size: 0.9rem; cursor: pointer; border-radius: 4px; transition: all 0.1s; box-shadow: 0 4px 0 #009db8;
    }
    .btn-add:active { transform: translateY(3px); box-shadow: 0 1px 0 #009db8; }

    /* MAIN TABLE */
    .table-container {
        flex-grow: 1; overflow-y: auto; padding: 0 24px 24px 24px; background: var(--bg);
        -webkit-overflow-scrolling: touch;
    }
    .data-table {
        width: 100%; border-collapse: collapse; font-size: 0.85rem;
    }
    .data-table thead { position: sticky; top: 0; z-index: 2; background: var(--bg); }
    .data-table th {
        text-align: left; padding: 16px 12px; color: #555; border-bottom: 2px solid var(--border);
        text-transform: uppercase; letter-spacing: 1px; font-size: 0.7rem;
    }
    .data-table td {
        padding: 14px 12px; border-bottom: 1px solid #111; vertical-align: middle;
    }
    .data-table tbody tr { transition: background 0.2s; }
    .data-table tbody tr:hover { background: rgba(0, 217, 255, 0.05); }

    .status-badge {
        padding: 4px 8px; border-radius: 3px; font-size: 0.65rem; font-weight: bold; text-transform: uppercase; display: inline-block; letter-spacing: 0.5px;
    }
    .s-valid { background: rgba(46,213,115,0.15); color: var(--success); border: 1px solid rgba(46,213,115,0.3); }
    .s-expired { background: rgba(255,165,2,0.15); color: var(--warning); border: 1px solid rgba(255,165,2,0.3); }
    .s-flagged { background: rgba(255,0,68,0.15); color: var(--danger); border: 1px solid rgba(255,0,68,0.3); }

    .btn-sm {
        background: #222; border: 1px solid #333; color: #888; padding: 6px 12px; font-family: monospace; font-size: 0.7rem; cursor: pointer; border-radius: 3px; text-transform: uppercase; margin-right: 5px; transition: 0.2s;
    }
    .btn-sm:hover { border-color: var(--accent); color: var(--accent); }
    .btn-sm.del:hover { border-color: var(--danger); color: var(--danger); }

    .empty-state { text-align: center; padding: 60px 20px; color: #333; font-size: 0.9rem; }

    /* MODAL */
    .modal-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 50;
        display: none; justify-content: center; align-items: center; padding: 20px;
    }
    .modal-overlay.open { display: flex; }

    .modal-box {
        background: var(--panel); border: 1px solid var(--accent); border-radius: 8px; width: 100%; max-width: 500px;
        display: flex; flex-direction: column; max-height: 90vh; box-shadow: 0 0 30px rgba(0,217,255,0.1);
    }
    .modal-header {
        padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;
    }
    .modal-title { color: var(--accent); text-transform: uppercase; letter-spacing: 1px; font-size: 0.9rem; }
    .btn-close-modal { background: none; border: 1px solid #333; color: #555; width: 30px; height: 30px; cursor: pointer; font-family: monospace; font-size: 1.2rem; transition: 0.2s; }
    .btn-close-modal:hover { border-color: var(--danger); color: var(--danger); }

    .modal-body { padding: 20px; overflow-y: auto; flex-grow: 1; display: flex; flex-direction: column; gap: 15px; }
    
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-label { font-size: 0.75rem; color: #666; text-transform: uppercase; letter-spacing: 1px; }
    .form-input {
        background: #000; border: 1px solid var(--border); color: #fff; padding: 12px; font-family: monospace; font-size: 0.9rem; border-radius: 4px; outline: none;
    }
    .form-input:focus { border-color: var(--accent); }
    select.form-input { cursor: pointer; }

    .modal-footer { padding: 20px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 15px; }
    .btn-cancel { background: #222; border: 1px solid #333; color: #888; padding: 12px 24px; font-family: monospace; font-weight: bold; text-transform: uppercase; cursor: pointer; border-radius: 4px; }
    .btn-save { background: var(--accent); color: #000; border: none; padding: 12px 24px; font-family: monospace; font-weight: bold; text-transform: uppercase; cursor: pointer; border-radius: 4px; box-shadow: 0 4px 0 #009db8; transition: 0.1s; }
    .btn-save:active { transform: translateY(3px); box-shadow: 0 1px 0 #009db8; }

    /* Responsive Overrides */
    @media (max-width: 1024px) {
        .stats-row { grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 16px; }
        .stat-box { padding: 12px; }
        .stat-value { font-size: 1.4rem; }
        .controls { padding: 16px; gap: 10px; }
        .table-container { padding: 0 16px 16px 16px; }
    }
    @media (max-width: 768px) {
        .top-bar { padding: 12px 16px; }
        .stats-row { padding: 12px; gap: 8px; }
        .stat-label { font-size: 0.6rem; }
        .stat-value { font-size: 1.2rem; }
        .stat-box { padding: 10px; }
        .controls { padding: 12px; gap: 8px; }
        .search-box, select.filter-select, .btn-add { font-size: 0.8rem; padding: 10px 12px; }
        .table-container { padding: 0 12px 12px 12px; }
        .data-table th, .data-table td { padding: 10px 8px; font-size: 0.75rem; }
        .hide-mobile { display: none; }
        .btn-sm { padding: 8px 10px; font-size: 0.75rem; }
        .modal-body { padding: 16px; }
    }
    @media (max-width: 380px) {
        .stats-row { grid-template-columns: repeat(2, 1fr); gap: 6px; }
        .stat-value { font-size: 1rem; }
        .search-box { min-width: 100%; order: 2; }
    }
    @media (max-height: 500px) and (orientation: landscape) {
        .stats-row { padding: 8px 16px; gap: 8px; }
        .stat-box { padding: 8px; flex-direction: row; align-items: center; justify-content: space-between; }
        .stat-value { font-size: 1.2rem; }
        .controls { padding: 8px 16px; }
    }
    :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }
</style>
</head>
<body>

<div class="app-container">
    <div class="top-bar">
        <h1>▸ NHAI_CITIZEN_ARCHIVE // MAINFRAME_v1.0</h1>
        <div class="top-bar-right">
            <span class="sync-badge waiting" id="syncBadge">● SYNCING</span>
            <div class="time" id="clock">00:00:00</div>
        </div>
    </div>

    <div class="stats-row">
        <div class="stat-box s-total">
            <div class="stat-label">Total Records</div>
            <div class="stat-value" id="statTotal">0</div>
        </div>
        <div class="stat-box s-valid">
            <div class="stat-label">Valid Cards</div>
            <div class="stat-value" id="statValid">0</div>
        </div>
        <div class="stat-box s-expired">
            <div class="stat-label">Expired</div>
            <div class="stat-value" id="statExpired">0</div>
        </div>
        <div class="stat-box s-flagged">
            <div class="stat-label">Flagged</div>
            <div class="stat-value" id="statFlagged">0</div>
        </div>
    </div>

    <div class="controls">
        <input type="text" class="search-box" id="searchInput" placeholder="Search Name, Plate, DL...">
        <select class="filter-select" id="filterSelect">
            <option value="ALL">All Status</option>
            <option value="VALID">Valid</option>
            <option value="EXPIRED">Expired</option>
            <option value="FLAGGED">Flagged</option>
        </select>
        <button class="btn-add" id="btnAddRecord">+ Add Record</button>
    </div>

    <div class="table-container" id="tableContainer">
        <table class="data-table">
            <thead>
                <tr>
                    <th>Plate ID</th>
                    <th>Citizen Name</th>
                    <th class="hide-mobile">DL ID</th>
                    <th>Status</th>
                    <th class="hide-mobile">Expiry</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
        <div class="empty-state" id="emptyState" style="display:none;">
            DATABASE EMPTY // NO RECORDS FOUND
        </div>
    </div>
</div>

<!-- ADD/EDIT MODAL -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal-box">
        <div class="modal-header">
            <div class="modal-title" id="modalTitle">■ New Record</div>
            <button class="btn-close-modal" id="btnCloseModal">×</button>
        </div>
        <div class="modal-body">
            <input type="hidden" id="editPlateOriginal">
            <div class="form-group">
                <label class="form-label">Vehicle Plate ID</label>
                <input type="text" class="form-input" id="formPlate" placeholder="e.g. XYZ-1234" required>
            </div>
            <div class="form-group">
                <label class="form-label">Citizen Full Name</label>
                <input type="text" class="form-input" id="formName" placeholder="e.g. JOHN WICK" required>
            </div>
            <div class="form-group">
                <label class="form-label">DL / ID Number</label>
                <input type="text" class="form-input" id="formDl" placeholder="e.g. DL-9982">
            </div>
            <div class="form-group">
                <label class="form-label">Card Status</label>
                <select class="form-input" id="formStatus">
                    <option value="VALID">VALID</option>
                    <option value="EXPIRED">EXPIRED</option>
                    <option value="FLAGGED">FLAGGED (WANTED)</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Expiry Date</label>
                <input type="date" class="form-input" id="formExpiry">
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn-cancel" id="btnCancelModal">Cancel</button>
            <button class="btn-save" id="btnSaveRecord">Save Record</button>
        </div>
    </div>
</div>

<script>
    const LS_D1_KEY = 'enforcementTerminalV23_D1';
    const LS_D2_KEY = 'enforcementTerminalV23_TOLL';
    
    let archiveData = {
        revenue: 0, valids: 0, missed: 0, level: 1, rankPoints: 0, registry: {}, history: [],
        activeInmates: [], releasedInmates: [], inbox: [], sentMail: [], call911Logs: [],
        forgedAliases: {}, nextSpawnOverride: null, ledgerCashouts: [], intelFlags: [],
        paroleRecords: [], iaViolations: [], rehabPrograms: [], citizenCards: {}
    };

    function updateClock() { document.getElementById('clock').textContent = new Date().toLocaleTimeString('en-GB'); }
    setInterval(updateClock, 1000); updateClock();

    // Security: Event listeners attached safely instead of inline HTML onclick attributes
    document.getElementById('searchInput').addEventListener('input', renderTable);
    document.getElementById('filterSelect').addEventListener('change', renderTable);
    document.getElementById('btnAddRecord').addEventListener('click', () => openModal());
    document.getElementById('btnCloseModal').addEventListener('click', closeModal);
    document.getElementById('btnCancelModal').addEventListener('click', closeModal);
    document.getElementById('btnSaveRecord').addEventListener('click', saveRecord);

    // Close modal if clicking outside the box
    document.getElementById('modalOverlay').addEventListener('click', (e) => {
        if (e.target === e.currentTarget) closeModal();
    });

    function loadData() {
        try {
            const d1 = localStorage.getItem(LS_D1_KEY);
            const d2 = localStorage.getItem(LS_D2_KEY);
            let d1Data = null, d2Data = null;
            if (d1) { try { d1Data = JSON.parse(d1); } catch(e) { console.error("D1 Parse Error", e); } }
            if (d2) { try { d2Data = JSON.parse(d2); } catch(e) { console.error("D2 Parse Error", e); } }

            let mergedData = {
                revenue: 0, valids: 0, missed: 0, level: 1, rankPoints: 0, registry: {}, history: [],
                activeInmates: [], releasedInmates: [], inbox: [], sentMail: [], call911Logs: [],
                forgedAliases: {}, nextSpawnOverride: null, ledgerCashouts: [], intelFlags: [],
                paroleRecords: [], iaViolations: [], rehabPrograms: [], citizenCards: {}
            };

            if (d1Data) {
                Object.assign(mergedData, d1Data);
                if (d1Data.registry) Object.assign(mergedData.registry, d1Data.registry);
                if (d1Data.citizenCards) Object.assign(mergedData.citizenCards, d1Data.citizenCards);
                if (d1Data.activeInmates) mergedData.activeInmates = d1Data.activeInmates;
                if (d1Data.releasedInmates) mergedData.releasedInmates = d1Data.releasedInmates;
            }

            if (d2Data) {
                mergedData.revenue = Math.max(mergedData.revenue || 0, d2Data.revenue || 0);
                mergedData.valids = Math.max(mergedData.valids || 0, d2Data.valids || 0);
                mergedData.missed = Math.max(mergedData.missed || 0, d2Data.missed || 0);
                mergedData.level = Math.max(mergedData.level || 1, d2Data.level || 1);
                mergedData.rankPoints = Math.max(mergedData.rankPoints || 0, d2Data.rankPoints || 0);
                if (d2Data.registry) Object.assign(mergedData.registry, d2Data.registry);
                if (d2Data.citizenCards) Object.assign(mergedData.citizenCards, d2Data.citizenCards);
                if (d2Data.history) {
                    mergedData.history = d2Data.history.concat(mergedData.history).filter((v, i, a) =>
                        a.findIndex(t => (t.plate === v.plate && t.timestamp === v.timestamp)) === i
                    );
                }
                if (d2Data.activeInmates && d2Data.activeInmates.length > mergedData.activeInmates.length) mergedData.activeInmates = d2Data.activeInmates;
                if (d2Data.releasedInmates && d2Data.releasedInmates.length > (mergedData.releasedInmates || []).length) mergedData.releasedInmates = d2Data.releasedInmates;

                if (!mergedData.call911Logs && d2Data.call911Logs) mergedData.call911Logs = d2Data.call911Logs;
                if (!mergedData.paroleRecords && d2Data.paroleRecords) mergedData.paroleRecords = d2Data.paroleRecords;
                if (!mergedData.rehabPrograms && d2Data.rehabPrograms) mergedData.rehabPrograms = d2Data.rehabPrograms;
                if (!mergedData.forgedAliases && d2Data.forgedAliases) mergedData.forgedAliases = d2Data.forgedAliases;
            }

            // Ensure all sub-keys exist
            if (!mergedData.registry) mergedData.registry = {};
            if (!mergedData.citizenCards) mergedData.citizenCards = {};
            if (!mergedData.history) mergedData.history = [];
            if (!mergedData.forgedAliases) mergedData.forgedAliases = {};
            if (!mergedData.activeInmates) mergedData.activeInmates = [];
            if (!mergedData.releasedInmates) mergedData.releasedInmates = [];
            if (!mergedData.inbox) mergedData.inbox = [];
            if (!mergedData.sentMail) mergedData.sentMail = [];
            if (!mergedData.call911Logs) mergedData.call911Logs = [];
            if (!mergedData.ledgerCashouts) mergedData.ledgerCashouts = [];
            if (!mergedData.intelFlags) mergedData.intelFlags = [];
            if (!mergedData.paroleRecords) mergedData.paroleRecords = [];
            if (!mergedData.iaViolations) mergedData.iaViolations = [];
            if (!mergedData.rehabPrograms) mergedData.rehabPrograms = [];

            archiveData = mergedData;
            updateSyncBadge(d1Data, d2Data);
        } catch(e) { console.error("Load error:", e); }
    }

    // Sync Fix: Auto-saving keeps D1 and D2 always in lockstep, preventing partial syncs
    function saveData() {
        try {
            const dataStr = JSON.stringify(archiveData);
            localStorage.setItem(LS_D1_KEY, dataStr);
            localStorage.setItem(LS_D2_KEY, dataStr);
        } catch(e) { console.error("Save error:", e); }
    }

    function updateSyncBadge(d1Data, d2Data) {
        const badge = document.getElementById('syncBadge');
        if (d1Data && d2Data) { badge.textContent = "● DUAL SYNC"; badge.className = "sync-badge online"; }
        else if (d1Data || d2Data) { badge.textContent = "● PARTIAL"; badge.className = "sync-badge waiting"; }
        else { badge.textContent = "● OFFLINE"; badge.className = "sync-badge offline"; }
    }

    function updateStats() {
        let valid = 0, expired = 0, flagged = 0;
        const plates = Object.keys(archiveData.registry);
        plates.forEach(plate => {
            const status = getDisplayStatus(plate);
            if (status === 'FLAGGED') flagged++;
            else if (status === 'EXPIRED') expired++;
            else valid++;
        });
        document.getElementById('statTotal').textContent = plates.length;
        document.getElementById('statValid').textContent = valid;
        document.getElementById('statExpired').textContent = expired;
        document.getElementById('statFlagged').textContent = flagged;
    }

    function getDisplayStatus(plate) {
        const reg = archiveData.registry[plate];
        const card = archiveData.citizenCards[plate];
        if (!reg) return 'EXPIRED';
        if (reg.status === 'WANTED') return 'FLAGGED';
        if (!card) return 'EXPIRED';
        if (new Date(card.expiry) < new Date()) return 'EXPIRED';
        return 'VALID';
    }

    function renderTable() {
        const searchVal = document.getElementById('searchInput').value.toUpperCase();
        const filterVal = document.getElementById('filterSelect').value;
        const tbody = document.getElementById('tableBody');
        const emptyState = document.getElementById('emptyState');
        const plates = Object.keys(archiveData.registry);
        
        // Security Fix: Clear nodes properly
        while(tbody.firstChild) tbody.removeChild(tbody.firstChild);
        
        let count = 0;

        plates.forEach(plate => {
            const reg = archiveData.registry[plate];
            const card = archiveData.citizenCards[plate];
            const status = getDisplayStatus(plate);

            if (filterVal !== 'ALL' && status !== filterVal) return;
            const name = reg.name || 'UNKNOWN', dlId = reg.dlId || reg.id || 'N/A';
            if (searchVal) { 
                const combinedString = `${plate} ${name} ${dlId}`.toUpperCase(); 
                if (!combinedString.includes(searchVal)) return; 
            }

            count++;
            
            // Bug Fix: Handle Invalid Date gracefully
            let expiryStr = 'N/A';
            if (card && card.expiry) {
                const dateObj = new Date(card.expiry);
                if (!isNaN(dateObj.getTime())) {
                    expiryStr = dateObj.toLocaleDateString('en-GB');
                }
            }

            const tr = document.createElement('tr');
            
            // Security Fix: Safely construct elements to prevent XSS
            const tdPlate = document.createElement('td');
            tdPlate.style.color = "var(--accent)";
            tdPlate.style.fontWeight = "bold";
            tdPlate.textContent = plate; // textContent safely escapes HTML

            const tdName = document.createElement('td');
            tdName.textContent = name;

            const tdDl = document.createElement('td');
            tdDl.className = "hide-mobile";
            tdDl.textContent = dlId;

            const tdStatus = document.createElement('td');
            const statusSpan = document.createElement('span');
            statusSpan.className = `status-badge s-${status.toLowerCase()}`;
            statusSpan.textContent = status;
            tdStatus.appendChild(statusSpan);

            const tdExpiry = document.createElement('td');
            tdExpiry.className = "hide-mobile";
            tdExpiry.textContent = expiryStr;

            const tdActions = document.createElement('td');
            const editBtn = document.createElement('button');
            editBtn.className = "btn-sm";
            editBtn.textContent = "Edit";
            // Closures ensure the specific plate string is passed securely
            editBtn.addEventListener('click', () => openModal(plate)); 
            
            const delBtn = document.createElement('button');
            delBtn.className = "btn-sm del";
            delBtn.textContent = "Del";
            delBtn.addEventListener('click', () => deleteRecord(plate));

            tdActions.appendChild(editBtn);
            tdActions.appendChild(delBtn);

            tr.appendChild(tdPlate);
            tr.appendChild(tdName);
            tr.appendChild(tdDl);
            tr.appendChild(tdStatus);
            tr.appendChild(tdExpiry);
            tr.appendChild(tdActions);

            tbody.appendChild(tr);
        });
        
        emptyState.style.display = count === 0 ? 'block' : 'none';
    }

    function openModal(plate = null) {
        document.getElementById('editPlateOriginal').value = plate || '';
        if (plate) {
            document.getElementById('modalTitle').textContent = '■ Edit Record';
            document.getElementById('formPlate').value = plate;
            document.getElementById('formPlate').disabled = true;
            const reg = archiveData.registry[plate] || {}, card = archiveData.citizenCards[plate] || {};
            document.getElementById('formName').value = reg.name || '';
            document.getElementById('formDl').value = reg.dlId || reg.id || '';
            document.getElementById('formStatus').value = getDisplayStatus(plate);
            if (card && card.expiry) {
                const d = new Date(card.expiry);
                if (!isNaN(d.getTime())) {
                    document.getElementById('formExpiry').value = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
                } else {
                    document.getElementById('formExpiry').value = '';
                }
            } else { document.getElementById('formExpiry').value = ''; }
        } else {
            document.getElementById('modalTitle').textContent = '■ New Record';
            document.getElementById('formPlate').value = ''; document.getElementById('formPlate').disabled = false;
            document.getElementById('formName').value = ''; document.getElementById('formDl').value = '';
            document.getElementById('formStatus').value = 'VALID';
            const nextYear = new Date(); nextYear.setFullYear(nextYear.getFullYear() + 1);
            document.getElementById('formExpiry').value = nextYear.getFullYear() + '-' + String(nextYear.getMonth()+1).padStart(2,'0') + '-' + String(nextYear.getDate()).padStart(2,'0');
        }
        document.getElementById('modalOverlay').classList.add('open');
    }

    function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }

    function saveRecord() {
        // Sync Fix: Removed loadData() here. It was overwriting current state causing race conditions.
        const originalPlate = document.getElementById('editPlateOriginal').value;
        const plate = document.getElementById('formPlate').value.toUpperCase().trim();
        const name = document.getElementById('formName').value.toUpperCase().trim();
        const dlId = document.getElementById('formDl').value.toUpperCase().trim();
        const status = document.getElementById('formStatus').value;
        const expiry = document.getElementById('formExpiry').value;

        if (!plate || !name) { alert("Plate ID and Name are required."); return; }
        if (!originalPlate && archiveData.registry[plate]) { alert("Plate ID already exists in database."); return; }

        archiveData.registry[plate] = { name, dlId, status: status === 'FLAGGED' ? 'WANTED' : 'CLEAR' };

        if (status !== 'FLAGGED' && expiry) {
            const existingCard = archiveData.citizenCards[plate] || {};
            // Security Fix: Replaced Math.random() with crypto.randomUUID() for secure unique ID generation
            archiveData.citizenCards[plate] = {
                uid: existingCard.uid || `ARCH-${crypto.randomUUID().slice(0, 8)}`, 
                name: name, dlId: dlId, expiry: new Date(expiry).toISOString(), type: existingCard.type || "ARCHIVE CARD", city: existingCard.city || "MAINFRAME"
            };
        } else if (status === 'FLAGGED') {
            delete archiveData.citizenCards[plate];
        } else {
            if (!archiveData.citizenCards[plate]) {
                const nextYear = new Date(); nextYear.setFullYear(nextYear.getFullYear() + 1);
                archiveData.citizenCards[plate] = { 
                    uid: `ARCH-${crypto.randomUUID().slice(0, 8)}`, 
                    name: name, dlId: dlId, expiry: nextYear.toISOString(), type: "ARCHIVE CARD", city: "MAINFRAME" 
                };
            }
        }
        saveData(); updateStats(); renderTable(); closeModal();
    }

    function deleteRecord(plate) {
        if (confirm(`PERMANENTLY DELETE RECORD: ${plate}?`)) {
            // Sync Fix: Removed loadData() here to prevent race conditions
            delete archiveData.registry[plate]; 
            delete archiveData.citizenCards[plate];
            saveData(); updateStats(); renderTable();
        }
    }

    // Real-time cross-tab sync
    window.addEventListener('storage', (event) => {
        if (event.key === LS_D1_KEY || event.key === LS_D2_KEY) {
            loadData(); updateStats(); renderTable();
        }
    });

    loadData(); updateStats(); renderTable();
</script>
</body>
</html>
