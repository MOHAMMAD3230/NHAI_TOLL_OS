<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" href="https://mohammad3230.github.io/PROJECT/favicon.png" type="image/png" sizes="32x32" />
<script async src="https://www.googletagmanager.com/gtag/js?id=GT-NC6T5LRJ"></script>
<script>
window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','GT-NC6T5LRJ');
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NHAI - Internal Affairs Terminal</title>
<style>
:root{--bg:#0a0508;--panel:#101018;--accent:#ff0044;--success:#2ed573;--danger:#ff4757;--warning:#ffa502;--border:#2a1a2a;}
body{background:var(--bg);color:#ccc;font-family:'Courier New',monospace;margin:0;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
.top-bar{background:#000;padding:15px 20px;border-bottom:2px solid var(--danger);display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
.top-bar h1{margin:0;font-size:.9rem;color:var(--danger);letter-spacing:1px;text-shadow:0 0 10px rgba(255,0,68,.5);}
.top-bar .time{color:var(--warning);font-size:.8rem;}
.main-layout{display:grid;grid-template-columns:1fr 1fr;gap:20px;padding:20px;flex-grow:1;min-height:0;overflow:hidden;}
.panel{background:var(--panel);border:1px solid var(--border);border-radius:4px;padding:20px;display:flex;flex-direction:column;overflow:hidden;}
.panel-title{color:var(--danger);font-size:.85rem;text-transform:uppercase;letter-spacing:1px;margin-bottom:15px;border-bottom:1px solid var(--border);padding-bottom:10px;flex-shrink:0;}
.integrity-meter{background:#000;border:1px solid var(--border);border-radius:4px;padding:20px;text-align:center;margin-bottom:20px;flex-shrink:0;}
.integrity-score{font-size:4rem;font-weight:900;}
.integrity-bar{width:100%;height:8px;background:#333;border-radius:4px;margin-top:10px;overflow:hidden;}
.integrity-fill{height:100%;border-radius:4px;transition:width .5s;}
.stat-row{display:flex;gap:12px;margin-bottom:15px;flex-shrink:0;}
.stat-box{flex:1;background:#000;border:1px solid var(--border);padding:12px;border-radius:4px;text-align:center;}
.stat-num{font-size:1.5rem;font-weight:900;margin-bottom:3px;}
.stat-label{font-size:.65rem;color:#888;text-transform:uppercase;}
.violation-list{flex-grow:1;overflow-y:auto;padding-right:5px;min-height:0;}
.violation-item{background:#000;border:1px solid var(--border);padding:12px;margin-bottom:8px;border-left:4px solid var(--danger);border-radius:4px;font-size:.8rem;}
.violation-item.minor{border-left-color:var(--warning);}
.violation-item.major{border-left-color:var(--danger);}
.log-box{flex:1;background:#000;border:1px solid #222;padding:10px;font-size:.7rem;color:var(--danger);overflow-y:auto;border-radius:4px;min-height:0;}
.violation-list::-webkit-scrollbar,.log-box::-webkit-scrollbar{width:6px;}
.violation-list::-webkit-scrollbar-track,.log-box::-webkit-scrollbar-track{background:#000;border:1px solid var(--border);}
.violation-list::-webkit-scrollbar-thumb,.log-box::-webkit-scrollbar-thumb{background:var(--danger);}
.mech-btn{width:100%;padding:12px;border:2px solid #000;cursor:pointer;font-weight:bold;text-transform:uppercase;font-size:.8rem;box-shadow:0 3px 0 #000;transition:all .1s;font-family:monospace;border-radius:4px;margin-top:10px;flex-shrink:0;background:var(--danger);color:#fff;}
.mech-btn:active{transform:translateY(2px);box-shadow:0 1px 0 #000;}
@media(max-width:1024px){.main-layout{grid-template-columns:1fr;overflow-y:auto;}}
@media(max-width:600px){.top-bar h1{font-size:.7rem;}.integrity-score{font-size:3rem;}}
</style>
</head>
<body>
<div class="top-bar">
<h1>▸ NHAI_IAFFAIRS // INTERNAL_TERMINAL_v14.0</h1>
<div class="time" id="clock">00:00:00</div>
</div>
<div class="main-layout">
<div class="panel">
<div class="panel-title">■ Officer Integrity Score</div>
<div class="integrity-meter">
<div class="integrity-score" id="integrity-score">100</div>
<div style="font-size:.75rem;color:#888;">INTEGRITY RATING</div>
<div class="integrity-bar"><div class="integrity-fill" id="integrity-fill" style="width:100%;background:var(--success);"></div></div>
</div>
<div class="stat-row">
<div class="stat-box"><div class="stat-num" style="color:var(--success)" id="s-valid">0</div><div class="stat-label">Valid Actions</div></div>
<div class="stat-box"><div class="stat-num" style="color:var(--danger)" id="s-breaches">0</div><div class="stat-label">Breaches</div></div>
<div class="stat-box"><div class="stat-num" style="color:var(--warning)" id="s-suspect">0</div><div class="stat-label">Suspicious</div></div>
</div>
<div class="violation-list" id="violation-list"><div style="color:#555;text-align:center;padding:20px;">NO VIOLATIONS</div></div>
<button class="mech-btn" onclick="runAudit()">RUN FULL AUDIT</button>
</div>
<div class="panel">
<div class="panel-title">■ Investigation Log</div>
<div class="log-box" id="ia-log"></div>
</div>
</div>
<script>
const LS_D1_KEY = 'enforcementTerminalV23_D1'; const LS_D2_KEY = 'enforcementTerminalV23_TOLL';
let sharedData = { revenue: 0, valids: 0, missed: 0, level: 1, rankPoints: 0, history: [], registry: {}, forgedAliases: {}, nextSpawnOverride: null, activeInmates: [], releasedInmates: [], ledgerCashouts: [], intelFlags: [], paroleRecords: [], iaViolations: [], rehabPrograms: [] };
function updateClock(){document.getElementById('clock').innerText=new Date().toLocaleTimeString('en-GB');} setInterval(updateClock,1000);
function deepMerge(target, source) { for (const key in source) { if (source[key] instanceof Array) { target[key] = source[key]; } else if (source[key] instanceof Object && target[key] instanceof Object) { deepMerge(target[key], source[key]); } else { target[key] = source[key]; } } return target; }
function loadData(){
    const d1 = localStorage.getItem(LS_D1_KEY); const d2 = localStorage.getItem(LS_D2_KEY); sharedData = { history:[], registry:{}, forgedAliases:{}, iaViolations:[] };
    if (d1) { const p = JSON.parse(d1); deepMerge(sharedData, p); if(p.registry) Object.assign(sharedData.registry, p.registry); }
    if (d2) { const p = JSON.parse(d2); deepMerge(sharedData, p); if(p.registry) Object.assign(sharedData.registry, p.registry); if(p.history) sharedData.history = p.history.concat(sharedData.history).filter((v, i, a) => a.findIndex(t => (t.plate === v.plate && t.timestamp === v.timestamp)) === i); }
    if(!sharedData.iaViolations) sharedData.iaViolations = []; if(!sharedData.history) sharedData.history = []; if(!sharedData.registry) sharedData.registry = {}; if(!sharedData.forgedAliases) sharedData.forgedAliases = {};
    renderDashboard(); renderLogs();
}
function saveData(){ const d = JSON.stringify(sharedData); localStorage.setItem(LS_D1_KEY, d); localStorage.setItem(LS_D2_KEY, d); }
function addLog(msg,color){ const l=document.getElementById('ia-log'); const e=document.createElement('div'); e.style.color=color||'var(--danger)'; e.style.marginBottom='5px'; e.innerText='> '+msg; l.prepend(e); if(!sharedData.iaViolations) sharedData.iaViolations = []; sharedData.iaViolations.push({ plate: "IA_SYSTEM", type: "LOG", message: msg, color: color, time: new Date().toLocaleTimeString(), status: "LOGGED" }); saveData(); }
function renderLogs(){ const l=document.getElementById('ia-log'); l.innerHTML = ''; const logs = (sharedData.iaViolations||[]).filter(f => f.plate === 'IA_SYSTEM' && f.type === 'LOG').slice(-30).reverse(); if(logs.length === 0){ l.innerHTML = '<div style="color:#555;">No investigation logs recorded yet.</div>'; } else { logs.forEach(log => { const e=document.createElement('div'); e.style.color=log.color||'var(--danger)'; e.style.marginBottom='5px'; e.innerText='> '+log.message; l.appendChild(e); }); } }
function runAudit(){
    loadData(); addLog('AUDIT: Scanning all officer actions...','#888'); const hist=sharedData.history||[]; const reg=sharedData.registry||{}; const aliases=sharedData.forgedAliases||{}; let violations=[]; let suspicious=0;
    const forgedPlates=Object.keys(aliases);
    hist.forEach(h=>{
        if(h.action==='ARRESTED'&&h.plate!=='UNKNOWN'&&!h.plate.startsWith('HOLD-')){ if(reg[h.plate]&&reg[h.plate].status==='CLEAR'){ violations.push({type:'WRONGFUL ARREST',plate:h.plate,severity:'major',time:h.timestamp,detail:'Arrested a CLEAR citizen'}); } }
        if(h.action==='RELEASED'||h.action.includes('PAROLE / RELEASED')){ if(forgedPlates.includes(h.plate)){ violations.push({type:'CORRUPT RELEASE',plate:h.plate,severity:'major',time:h.timestamp,detail:'Released a known forged alias'}); suspicious++; } const histForPlate = hist.filter(x => x.plate === h.plate); const wasArrested = histForPlate.some(x => x.action.includes('ARRESTED')); const currentReg = reg[h.plate]; if(wasArrested && !currentReg) { violations.push({type:'ILLEGAL RELEASE',plate:h.plate,severity:'major',time:h.timestamp,detail:'Released subject without updating registry'}); suspicious++; } }
        if(h.action==='LICENSE APPROVED'){ if(forgedPlates.includes(h.plate)){ violations.push({type:'CORRUPT LICENSING',plate:h.plate,severity:'major',time:h.timestamp,detail:'Approved license for known forged alias'}); suspicious++; } }
    });
    Object.keys(reg).forEach(plate=>{ if(reg[plate].registeredBy==='SYNDICATE_FORGE'){ const tollPass=hist.find(h=>h.plate===plate&&h.action&&h.action.includes('TOLL')); if(tollPass){ violations.push({type:'TOLL BYPASS ASSIST',plate:plate,severity:'minor',time:tollPass.timestamp,detail:'Forged vehicle passed toll without flag'}); suspicious++; } } });
    const existingLogs = (sharedData.iaViolations||[]).filter(v => v.type === 'LOG'); sharedData.iaViolations = [...existingLogs, ...violations]; saveData();
    const validActions=sharedData.valids||0; const breaches=sharedData.missed||0; const integrity=Math.max(0,100-(breaches*5)-(violations.filter(v=>v.severity==='major').length*10)-(suspicious*3));
    document.getElementById('integrity-score').innerText=integrity; const fill=document.getElementById('integrity-fill'); fill.style.width=integrity+'%'; fill.style.background=integrity>70?'var(--success)':integrity>40?'var(--warning)':'var(--danger)';
    document.getElementById('s-valid').innerText=validActions; document.getElementById('s-breaches').innerText=breaches; document.getElementById('s-suspect').innerText=suspicious;
    const list=document.getElementById('violation-list'); list.innerHTML='';
    if(violations.length===0){ list.innerHTML='<div style="color:var(--success);text-align:center;padding:20px;">NO VIOLATIONS DETECTED</div>'; addLog('AUDIT COMPLETE: Officer conduct is clean.','var(--success)'); return; }
    violations.forEach(v=>{ const d=document.createElement('div'); d.className='violation-item '+v.severity; d.innerHTML=`<div style="display:flex;justify-content:space-between"><span style="color:${v.severity==='major'?'var(--danger)':'var(--warning)'};font-weight:bold">${v.type}</span><span style="color:#555">${v.time}</span></div><div style="font-size:.7rem;color:#888;margin-top:4px">${v.plate} — ${v.detail}</div>`; list.appendChild(d); });
    addLog(`AUDIT COMPLETE: ${violations.length} violations, ${suspicious} suspicious patterns. Integrity: ${integrity}%`,integrity>70?'var(--success)':'var(--danger)');
}
function renderDashboard(){
    const v=(sharedData.iaViolations||[]).filter(x => x.type !== 'LOG'); const b=sharedData.missed||0; const integrity=Math.max(0,100-(b*5)-(v.filter(x=>x.severity==='major').length*10));
    document.getElementById('integrity-score').innerText=integrity; const fill=document.getElementById('integrity-fill'); fill.style.width=integrity+'%'; fill.style.background=integrity>70?'var(--success)':integrity>40?'var(--warning)':'var(--danger)';
    document.getElementById('s-valid').innerText=sharedData.valids||0; document.getElementById('s-breaches').innerText=b;
    const list=document.getElementById('violation-list'); list.innerHTML='';
    if(v.length === 0){ list.innerHTML='<div style="color:#555;text-align:center;padding:20px;">NO VIOLATIONS</div>'; } else { v.forEach(vi=>{ const d=document.createElement('div'); d.className='violation-item '+(vi.severity||'minor'); d.innerHTML=`<div style="display:flex;justify-content:space-between"><span style="color:${vi.severity==='major'?'var(--danger)':'var(--warning)'};font-weight:bold">${vi.type}</span><span style="color:#555">${vi.time||'N/A'}</span></div><div style="font-size:.7rem;color:#888;margin-top:4px">${vi.plate||'SYS'} — ${vi.detail||''}</div>`; list.appendChild(d); }); }
}
loadData(); setInterval(loadData,2000);
</script>
</body>
</html>
