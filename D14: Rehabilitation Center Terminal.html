<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" href="https://mohammad3230.github.io/PROJECT/favicon.png" type="image/png" sizes="32x32" />
<script async src="https://www.googletagmanager.com/gtag/js?id=GT-NC6T5LRJ"></script>
<script>
window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','GT-NC6T5LRJ');
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NHAI - Rehabilitation Center Terminal</title>
<style>
:root{--bg:#050810;--panel:#0a1018;--accent:#00d9ff;--success:#2ed573;--danger:#ff0044;--warning:#ffa502;--border:#1a2a3a;}
body{background:var(--bg);color:#ccc;font-family:'Courier New',monospace;margin:0;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
.top-bar{background:#000;padding:15px 20px;border-bottom:2px solid var(--accent);display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
.top-bar h1{margin:0;font-size:.9rem;color:var(--accent);letter-spacing:1px;}
.top-bar .time{color:var(--warning);font-size:.8rem;}
.main-layout{display:grid;grid-template-columns:1fr 1fr;gap:20px;padding:20px;flex-grow:1;min-height:0;overflow:hidden;}
.panel{background:var(--panel);border:1px solid var(--border);border-radius:4px;padding:20px;display:flex;flex-direction:column;overflow:hidden;}
.panel-title{color:var(--accent);font-size:.85rem;text-transform:uppercase;letter-spacing:1px;margin-bottom:15px;border-bottom:1px solid var(--border);padding-bottom:10px;flex-shrink:0;}
.stat-row{display:flex;gap:12px;margin-bottom:20px;flex-shrink:0;}
.stat-box{flex:1;background:#000;border:1px solid var(--border);padding:15px;border-radius:4px;text-align:center;border-top:3px solid var(--accent);}
.stat-num{font-size:2rem;font-weight:900;margin-bottom:5px;}
.stat-label{font-size:.7rem;color:#888;text-transform:uppercase;}
.rehab-list{flex-grow:1;overflow-y:auto;padding-right:5px;min-height:0;}
.rehab-item{background:#000;border:1px solid var(--border);padding:15px;margin-bottom:10px;border-left:4px solid var(--accent);border-radius:4px;}
.rehab-item.ready{border-left-color:var(--success);box-shadow:inset 0 0 15px rgba(46,213,115,.1);}
.rehab-item.in-progress{border-left-color:var(--warning);}
.plate-tag{color:var(--warning);font-weight:bold;font-size:1.1rem;}
.meta-tag{color:#555;font-size:.75rem;margin-top:4px;}
.progress-bar{width:100%;height:6px;background:#333;border-radius:3px;margin-top:8px;overflow:hidden;}
.progress-fill{height:100%;border-radius:3px;transition:width 1s linear;}
.mech-btn{padding:10px 15px;border:2px solid #000;cursor:pointer;font-weight:bold;text-transform:uppercase;font-size:.7rem;box-shadow:0 3px 0 #000;transition:all .1s;font-family:monospace;border-radius:4px;flex-shrink:0;}
.mech-btn:active{transform:translateY(2px);box-shadow:0 1px 0 #000;}
.mech-btn:disabled{opacity:.3;cursor:not-allowed;}
.btn-enroll{background:var(--accent);color:#000;}
.btn-graduate{background:var(--success);color:#000;}
.log-box{flex:1;background:#000;border:1px solid #222;padding:10px;font-size:.7rem;color:var(--accent);overflow-y:auto;border-radius:4px;min-height:0;}
.rehab-list::-webkit-scrollbar,.log-box::-webkit-scrollbar{width:6px;}
.rehab-list::-webkit-scrollbar-track,.log-box::-webkit-scrollbar-track{background:#000;border:1px solid var(--border);}
.rehab-list::-webkit-scrollbar-thumb,.log-box::-webkit-scrollbar-thumb{background:var(--accent);}
.graduated-item{background:#000;border:1px solid var(--border);padding:12px;margin-bottom:8px;border-left:4px solid var(--success);border-radius:4px;opacity:0.6;}
.graduated-badge{display:inline-block;padding:2px 8px;border-radius:3px;font-size:.6rem;font-weight:bold;background:rgba(46,213,115,.15);color:var(--success);border:1px solid var(--success);}
@media(max-width:1024px){.main-layout{grid-template-columns:1fr;overflow-y:auto;}}
@media(max-width:600px){.top-bar h1{font-size:.7rem;}.rehab-item{padding:10px;}.mech-btn{font-size:.6rem;padding:8px 10px;}}
</style>
</head>
<body>
<div class="top-bar">
<h1>▸ NHAI_REHAB // CENTER_TERMINAL_v15.0</h1>
<div class="time" id="clock">00:00:00</div>
</div>
<div class="main-layout">
<div class="panel">
<div class="panel-title">■ Rehabilitation Programs</div>
<div class="stat-row">
<div class="stat-box"><div class="stat-num" style="color:var(--accent)" id="stat-enrolled">0</div><div class="stat-label">Enrolled</div></div>
<div class="stat-box"><div class="stat-num" style="color:var(--success)" id="stat-graduated">0</div><div class="stat-label">Graduated</div></div>
<div class="stat-box"><div class="stat-num" style="color:var(--warning)" id="stat-awaiting">0</div><div class="stat-label">Awaiting</div></div>
</div>
<div class="rehab-list" id="rehab-list"><div style="color:#555;text-align:center;padding:40px;">NO INMATES IN REHAB</div></div>
</div>
<div class="panel">
<div class="panel-title">■ Processing Log</div>
<div class="log-box" id="rehab-log"></div>
<button class="mech-btn btn-enroll" onclick="enrollFromReleased()" style="margin-top:15px;">ENROLL RELEASED INMATES</button>
</div>
</div>
<script>
const LS_MASTER_KEY = 'enforcementTerminalV23_D1';
let sharedData = { revenue: 0, valids: 0, missed: 0, level: 1, rankPoints: 0, history: [], registry: {}, forgedAliases: {}, nextSpawnOverride: null, activeInmates: [], releasedInmates: [], ledgerCashouts: [], intelFlags: [], paroleRecords: [], iaViolations: [], rehabPrograms: [] };
function updateClock(){document.getElementById('clock').innerText=new Date().toLocaleTimeString('en-GB');} setInterval(updateClock,1000);
function deepMerge(target, source) { for (const key in source) { if (source[key] instanceof Array) { target[key] = source[key]; } else if (source[key] instanceof Object && target[key] instanceof Object) { deepMerge(target[key], source[key]); } else { target[key] = source[key]; } } return target; }
function loadData(){
    const savedStr = localStorage.getItem(LS_MASTER_KEY); if(savedStr){ try { const p = JSON.parse(savedStr); deepMerge(sharedData, p); if(!sharedData.releasedInmates) sharedData.releasedInmates=[]; if(!sharedData.rehabPrograms) sharedData.rehabPrograms=[]; if(!sharedData.registry) sharedData.registry={}; if(!sharedData.history) sharedData.history=[]; if(!sharedData.iaViolations) sharedData.iaViolations=[]; } catch(e) {} } renderDashboard(); renderLogs();
}
function saveData(){ localStorage.setItem(LS_MASTER_KEY, JSON.stringify(sharedData)); }
function addLog(msg,color){ const l=document.getElementById('rehab-log'); const e=document.createElement('div'); e.style.color=color||'var(--accent)'; e.style.marginBottom='5px'; e.innerText='> '+msg; l.prepend(e); if(!sharedData.iaViolations) sharedData.iaViolations = []; sharedData.iaViolations.push({ plate: "REHAB_CENTER", type: "LOG", message: msg, color: color, time: new Date().toLocaleTimeString(), status: "LOGGED" }); saveData(); }
function renderLogs(){ const l=document.getElementById('rehab-log'); l.innerHTML = ''; const logs = (sharedData.iaViolations||[]).filter(f => f.plate === 'REHAB_CENTER' && f.type === 'LOG').slice(-30).reverse(); if(logs.length === 0){ l.innerHTML = '<div style="color:#555;">No processing logs recorded yet.</div>'; } else { logs.forEach(log => { const e=document.createElement('div'); e.style.color=log.color||'var(--accent)'; e.style.marginBottom='5px'; e.innerText='> '+log.message; l.appendChild(e); }); } }
function enrollFromReleased(){
    loadData(); const released=sharedData.releasedInmates.filter(i=> (i.status==='RELEASED'||i.status==='PAROLED') && i.status!=='GRADUATED'); let enrolled=0;
    released.forEach(inmate=>{ const already=sharedData.rehabPrograms.find(r=>r.plate===inmate.plate); if(!already){ sharedData.rehabPrograms.push({ plate:inmate.plate, realPlate:inmate.realPlate||inmate.plate, id:inmate.id||'MISSING', offense:inmate.offense||'UNKNOWN', progress:0, programDays:15+Math.floor(Math.random()*16), status:'ENROLLED', dateEnrolled:new Date().toLocaleDateString() }); enrolled++; } });
    if(enrolled>0){ saveData(); renderDashboard(); addLog(`ENROLLED: ${enrolled} released inmates into rehabilitation.`,'var(--accent)'); } else { addLog('No new released inmates to enroll.','var(--warning)'); }
}
function graduateInmate(index){
    loadData(); const prog=sharedData.rehabPrograms; if(index<0||index>=prog.length)return; const inmate=prog[index]; if(inmate.progress<inmate.programDays)return;
    const newPlate='RH-'+Math.floor(1000+Math.random()*9000); const newId='DL-REHAB-'+Math.floor(1000+Math.random()*9000);
    sharedData.registry[newPlate]={ id:newId, vClass:'LVM_CLASS_1', status:'CLEAR', registeredBy:'REHAB_CENTER' };
    const releasedRecord=sharedData.releasedInmates.find(r=>r.plate===inmate.plate); if(releasedRecord){ releasedRecord.status='GRADUATED'; releasedRecord.graduatedPlate=newPlate; releasedRecord.graduatedId=newId; releasedRecord.dateGraduated=new Date().toLocaleDateString(); }
    sharedData.history.push({ plate:newPlate, id:newId, action:'REHAB GRADUATED', timestamp:new Date().toLocaleTimeString() }); prog.splice(index,1); saveData(); renderDashboard(); addLog(`GRADUATED: ${inmate.plate} → ${newPlate} (${newId}). Reintegrated as CLEAR citizen.`,'var(--success)');
}
function renderDashboard(){
    const programs=sharedData.rehabPrograms||[]; const enrolled=programs.filter(p=>p.status==='ENROLLED').length; const graduatedCount=(sharedData.releasedInmates||[]).filter(i=>i.status==='GRADUATED').length; const awaiting=(sharedData.releasedInmates||[]).filter(i=> (i.status==='RELEASED'||i.status==='PAROLED') && !programs.find(p=>p.plate===i.plate) ).length;
    document.getElementById('stat-enrolled').innerText=enrolled; document.getElementById('stat-graduated').innerText=graduatedCount; document.getElementById('stat-awaiting').innerText=awaiting;
    const list=document.getElementById('rehab-list'); list.innerHTML='';
    if(programs.length===0 && graduatedCount===0){ list.innerHTML='<div style="color:#555;text-align:center;padding:40px;">NO INMATES IN REHABILITATION</div>'; return; }
    programs.forEach((inmate,idx)=>{ const pct=Math.min(100,Math.round((inmate.progress/inmate.programDays)*100)); const isReady=inmate.progress>=inmate.programDays; const item=document.createElement('div'); item.className='rehab-item '+(isReady?'ready':'in-progress'); item.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:15px;"><div style="flex:1;"><div class="plate-tag">${inmate.plate}</div><div class="meta-tag">Real: ${inmate.realPlate||'N/A'} | ID: ${inmate.id||'MISSING'}</div><div class="meta-tag">Offense: ${inmate.offense||'UNKNOWN'} | Program: ${inmate.programDays} days</div><div class="meta-tag" style="color:${isReady?'var(--success)':'var(--warning)'}">${isReady?'✔ PROGRAM COMPLETE — READY FOR GRADUATION':`Progress: ${inmate.progress}/${inmate.programDays} days (${pct}%)`}</div><div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${isReady?'var(--success)':'var(--warning)'}"></div></div></div>${isReady?`<button class="mech-btn btn-graduate" onclick="graduateInmate(${idx})">GRADUATE</button>`:''}</div>`; list.appendChild(item); });
    const graduatedList=(sharedData.releasedInmates||[]).filter(i=>i.status==='GRADUATED').slice(-5).reverse(); graduatedList.forEach(inmate=>{ const item=document.createElement('div'); item.className='graduated-item'; item.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;"><div><div class="plate-tag" style="color:#555;">${inmate.plate} <span style="font-size:.7rem;color:var(--success);">→ ${inmate.graduatedPlate||'N/A'}</span></div><div class="meta-tag">New ID: ${inmate.graduatedId||'N/A'} | Graduated: ${inmate.dateGraduated||'N/A'}</div></div><span class="graduated-badge">REHABILITATED</span></div>`; list.appendChild(item); });
}
setInterval(()=>{ let needsSave = false; (sharedData.rehabPrograms||[]).forEach(p=>{ if(p.status==='ENROLLED'&&p.progress<p.programDays){ p.progress++; needsSave=true; } }); if(needsSave){ saveData(); renderDashboard(); } },1000);
loadData(); setInterval(loadData,2000);
</script>
</body>
</html>
