<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="https://mohammad3230.github.io/PROJECT/favicon.png" type="image/png" sizes="32x32" />
    <script async src="https://www.googletagmanager.com/gtag/js?id=GT-NC6T5LRJ"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'GT-NC6T5LRJ');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0a10">
    <title>NHAI - Citizen Dashboard</title>
    <style>
        :root {
            --bg: #0a0a10; --panel: #12121a; --accent: #00d9ff; --success: #2ed573;
            --danger: #ff4757; --warning: #ffa502; --border: #2a2a3a;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --safe-top: env(safe-area-inset-top, 0px);
        }

        *, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg); color: #ccc; font-family: 'Courier New', Courier, monospace;
            margin: 0; height: 100vh; height: 100dvh; display: flex; flex-direction: column; overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .top-bar {
            background: #000; padding: 16px 24px; padding-top: calc(16px + var(--safe-top));
            border-bottom: 2px solid var(--accent); display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; z-index: 10;
        }
        .top-bar h1 { margin: 0; font-size: 1.1rem; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; }
        .top-bar-right { display: flex; align-items: center; gap: 15px; }
        .time { color: var(--warning); font-size: 0.9rem; font-variant-numeric: tabular-nums; }

        .sync-badge { font-size: 0.6rem; padding: 4px 10px; border-radius: 3px; letter-spacing: 1px; font-weight: bold; text-transform: uppercase; }
        .sync-badge.online { background: rgba(0,255,157,0.1); color: var(--success); border: 1px solid var(--success); }
        .sync-badge.offline { background: rgba(255,0,68,0.1); color: var(--danger); border: 1px solid var(--danger); }
        .sync-badge.waiting { background: rgba(255,204,0,0.1); color: var(--warning); border: 1px solid var(--warning); }

        .stats-container { padding: 20px 24px; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; flex-shrink: 0; }
        .stat-card { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 16px; display: flex; flex-direction: column; gap: 8px; transition: border-color 0.3s; }
        .stat-card:hover { border-color: var(--accent); }
        .stat-label { font-size: 0.75rem; color: #666; text-transform: uppercase; letter-spacing: 1px; }
        .stat-value { font-size: 1.8rem; font-weight: bold; font-variant-numeric: tabular-nums; }
        .text-accent { color: var(--accent); } .text-success { color: var(--success); }
        .text-danger { color: var(--danger); } .text-warning { color: var(--warning); }

        .controls-bar { padding: 0 24px 16px 24px; display: flex; gap: 12px; flex-shrink: 0; }
        .search-input { flex: 1; background: #000; border: 1px solid var(--border); color: #fff; padding: 12px 16px; font-family: monospace; font-size: 0.9rem; outline: none; border-radius: 4px; transition: border-color 0.2s; }
        .search-input:focus { border-color: var(--accent); } .search-input::placeholder { color: #444; }

        .mech-btn-sync { background: var(--accent); color: #000; border: 2px solid #000; padding: 12px 24px; font-weight: bold; text-transform: uppercase; font-size: 0.9rem; box-shadow: 0 4px 0 #000; transition: all 0.1s; font-family: monospace; border-radius: 4px; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        .mech-btn-sync:active { transform: translateY(3px); box-shadow: 0 1px 0 #000; } .mech-btn-sync:hover { background: #33e5ff; }

        .list-section { flex-grow: 1; background: var(--panel); border-top: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; margin: 0 24px 24px 24px; border-radius: 8px; }
        .list-header { padding: 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .list-title { color: var(--warning); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; }
        .record-count { font-size: 0.7rem; color: #555; }

        .table-head { display: grid; grid-template-columns: 1.2fr 1fr 1.2fr 1fr; gap: 16px; padding: 12px 16px; font-size: 0.7rem; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid var(--border); }
        .list-scroll { flex-grow: 1; overflow-y: auto; padding: 0 16px; -webkit-overflow-scrolling: touch; }
        .list-scroll::-webkit-scrollbar { width: 6px; } .list-scroll::-webkit-scrollbar-track { background: var(--panel); }
        .list-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; } .list-scroll::-webkit-scrollbar-thumb:hover { background: var(--accent); }

        .table-row { display: grid; grid-template-columns: 1.2fr 1fr 1.2fr 1fr; gap: 16px; padding: 14px 0; border-bottom: 1px dashed var(--border); font-size: 0.85rem; align-items: center; }
        .table-row:hover { background: rgba(255,255,255,0.02); }
        .plate-tag { color: var(--warning); font-weight: bold; } .plate-tag.wanted { color: var(--danger); }

        .source-tag { display: inline-block; padding: 2px 6px; border-radius: 2px; font-weight: bold; font-size: 0.55rem; margin-top: 4px; }
        .src-db { background: rgba(255,165,2,0.15); color: var(--warning); border: 1px solid rgba(255,165,2,0.3); }
        .src-d1 { background: rgba(0,217,255,0.15); color: var(--accent); border: 1px solid rgba(0,217,255,0.3); }
        .src-d2 { background: rgba(46,213,115,0.15); color: var(--success); border: 1px solid rgba(46,213,115,0.3); }
        .src-d7 { background: rgba(255,71,87,0.15); color: var(--danger); border: 1px solid rgba(255,71,87,0.3); }

        .status-tag { font-weight: bold; font-size: 0.65rem; padding: 6px 10px; text-align: center; border-radius: 4px; display: inline-block; width: 100%; box-sizing: border-box; }
        .status-clear { background: rgba(46, 213, 115, 0.2); color: var(--success); }
        .status-wanted { background: rgba(255, 71, 87, 0.2); color: var(--danger); animation: pulse 1.5s infinite; }
        .status-pending { background: rgba(255, 165, 2, 0.2); color: var(--warning); }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .empty-state { text-align: center; color: #555; padding: 60px 16px; }

        @media (max-width: 768px) {
            .top-bar { padding: 12px 16px; } .top-bar h1 { font-size: 0.8rem; letter-spacing: 1px; }
            .stats-container { padding: 16px; gap: 10px; grid-template-columns: repeat(2, 1fr); }
            .stat-value { font-size: 1.4rem; } .controls-bar { padding: 0 16px 12px 16px; flex-direction: column; }
            .mech-btn-sync { justify-content: center; } .list-section { margin: 0 16px 16px 16px; }
            .table-head, .table-row { grid-template-columns: 1.2fr 1fr 1.2fr 1fr; gap: 8px; font-size: 0.75rem; }
        }
        :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
        @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; } }
    </style>
</head>
<body>

<div class="top-bar">
    <h1>▸ NHAI_CITIZEN_DASHBOARD // LIVE</h1>
    <div class="top-bar-right">
        <!-- Added aria-live for accessibility so screen readers know when sync state changes -->
        <span class="sync-badge waiting" id="syncBadge" aria-live="polite">● SYNCING</span>
        <div class="time" id="clock">00:00:00</div>
    </div>
</div>

<div class="stats-container">
    <div class="stat-card"><div class="stat-label">Total Citizens</div><div class="stat-value text-accent" id="statTotal">0</div></div>
    <div class="stat-card"><div class="stat-label">Wanted (APB)</div><div class="stat-value text-danger" id="statWanted">0</div></div>
    <div class="stat-card"><div class="stat-label">Clear Status</div><div class="stat-value text-success" id="statClear">0</div></div>
    <div class="stat-card"><div class="stat-label">Active Inmates</div><div class="stat-value text-warning" id="statInmates">0</div></div>
    <div class="stat-card"><div class="stat-label">Revenue Collected</div><div class="stat-value text-success" id="statRevenue">$0</div></div>
    <div class="stat-card"><div class="stat-label">Toll Validations</div><div class="stat-value text-accent" id="statValidations">0</div></div>
</div>

<div class="controls-bar">
    <input type="text" class="search-input" id="searchInput" placeholder="Search by Plate or DL ID...">
    <button class="mech-btn-sync" id="syncBtn">⟳ FORCE SYNC</button>
</div>

<div class="list-section">
    <div class="list-header">
        <div class="list-title">■ Network Registry</div>
        <div class="record-count" id="recordCount">0 RECORDS</div>
    </div>
    <div class="table-head">
        <div>Plate / Source</div><div>DL ID</div><div>Vehicle Class</div><div>Status</div>
    </div>
    <div class="list-scroll" id="db-list"></div>
</div>

<script>
    const LS_D1_KEY = 'enforcementTerminalV23_D1';
    const LS_D2_KEY = 'enforcementTerminalV23_TOLL';
    let sharedData = {};
    let lastRegistryHash = '';
    let debounceTimer = null;

    // Debounce function to fix rapid layout thrashing on sync errors
    function debounceLoadData() {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(loadData, 300);
    }

    function updateClock() { document.getElementById('clock').textContent = new Date().toLocaleTimeString('en-GB'); }
    setInterval(updateClock, 1000); updateClock();

    let audioCtx = null;
    function getAudioCtx() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        return audioCtx;
    }

    function playSyncSound() {
        try {
            const ctx = getAudioCtx(); 
            const osc = ctx.createOscillator(); 
            const gain = ctx.createGain();
            osc.connect(gain); gain.connect(ctx.destination); 
            const t = ctx.currentTime;
            osc.type = 'sine'; 
            osc.frequency.setValueAtTime(500, t); 
            osc.frequency.setValueAtTime(800, t + 0.1); 
            osc.frequency.setValueAtTime(1200, t + 0.2);
            gain.gain.setValueAtTime(0.1, t); 
            gain.gain.exponentialRampToValueAtTime(0.01, t + 0.3);
            osc.start(t); osc.stop(t + 0.3);
        } catch(e) {
            console.warn("Audio playback failed:", e);
        }
    }

    function loadData() {
        try {
            const d1 = localStorage.getItem(LS_D1_KEY); 
            const d2 = localStorage.getItem(LS_D2_KEY);
            let d1Data = null, d2Data = null;
            
            if (d1) { try { d1Data = JSON.parse(d1); } catch(e) { console.error("D1 parse error", e); } }
            if (d2) { try { d2Data = JSON.parse(d2); } catch(e) { console.error("D2 parse error", e); } }

            let mergedData = {
                revenue: 0, valids: 0, missed: 0, level: 1, rankPoints: 0, registry: {}, history: [],
                activeInmates: [], releasedInmates: [], inbox: [], sentMail: [], call911Logs: [],
                forgedAliases: {}, nextSpawnOverride: null, ledgerCashouts: [], intelFlags: [],
                paroleRecords: [], iaViolations: [], rehabPrograms: [], citizenCards: {}
            };

            if (d1Data) {
                Object.assign(mergedData, d1Data);
                if (d1Data.registry) Object.assign(mergedData.registry, d1Data.registry);
                if (d1Data.citizenCards) Object.assign(mergedData.citizenCards, d1Data.citizenCards);
                if (d1Data.activeInmates) mergedData.activeInmates = d1Data.activeInmates;
                if (d1Data.releasedInmates) mergedData.releasedInmates = d1Data.releasedInmates;
            }
            
            if (d2Data) {
                mergedData.revenue = Math.max(mergedData.revenue || 0, d2Data.revenue || 0);
                mergedData.valids = Math.max(mergedData.valids || 0, d2Data.valids || 0);
                mergedData.missed = Math.max(mergedData.missed || 0, d2Data.missed || 0);
                mergedData.level = Math.max(mergedData.level || 1, d2Data.level || 1);
                mergedData.rankPoints = Math.max(mergedData.rankPoints || 0, d2Data.rankPoints || 0);
                if (d2Data.registry) Object.assign(mergedData.registry, d2Data.registry);
                if (d2Data.citizenCards) Object.assign(mergedData.citizenCards, d2Data.citizenCards);
                
                // FIX: Deep clone array elements to prevent object reference mutation/sync corruption
                if (d2Data.history) {
                    try {
                        const clonedD2History = JSON.parse(JSON.stringify(d2Data.history));
                        mergedData.history = clonedD2History.concat(mergedData.history).filter((v, i, a) => a.findIndex(t => (t.plate === v.plate && t.timestamp === v.timestamp)) === i);
                    } catch (e) {
                        console.error("History merge error", e);
                    }
                }
                
                if (d2Data.activeInmates && d2Data.activeInmates.length > mergedData.activeInmates.length) mergedData.activeInmates = d2Data.activeInmates;
                if (d2Data.releasedInmates && d2Data.releasedInmates.length > (mergedData.releasedInmates || []).length) mergedData.releasedInmates = d2Data.releasedInmates;
                if (!mergedData.call911Logs && d2Data.call911Logs) mergedData.call911Logs = d2Data.call911Logs;
                if (!mergedData.paroleRecords && d2Data.paroleRecords) mergedData.paroleRecords = d2Data.paroleRecords;
                if (!mergedData.rehabPrograms && d2Data.rehabPrograms) mergedData.rehabPrograms = d2Data.rehabPrograms;
                if (!mergedData.forgedAliases && d2Data.forgedAliases) mergedData.forgedAliases = d2Data.forgedAliases;
            }

            // Ensure array/object structures exist safely
            mergedData.registry = mergedData.registry || {};
            mergedData.citizenCards = mergedData.citizenCards || {};
            mergedData.history = mergedData.history || [];
            mergedData.forgedAliases = mergedData.forgedAliases || {};
            mergedData.activeInmates = mergedData.activeInmates || [];
            mergedData.releasedInmates = mergedData.releasedInmates || [];
            mergedData.inbox = mergedData.inbox || [];
            mergedData.sentMail = mergedData.sentMail || [];
            mergedData.call911Logs = mergedData.call911Logs || [];
            mergedData.ledgerCashouts = mergedData.ledgerCashouts || [];
            mergedData.intelFlags = mergedData.intelFlags || [];
            mergedData.paroleRecords = mergedData.paroleRecords || [];
            mergedData.iaViolations = mergedData.iaViolations || [];
            mergedData.rehabPrograms = mergedData.rehabPrograms || {};

            sharedData = mergedData;
            updateSyncBadge(d1Data, d2Data);
            updateStats();

            const regKeys = Object.keys(mergedData.registry).sort();
            const newHash = regKeys.map(k => k + ':' + (mergedData.registry[k].status || '') + ':' + (mergedData.registry[k].registeredBy || '')).join('|');
            if (newHash !== lastRegistryHash) { 
                lastRegistryHash = newHash; 
                renderDashboard(); 
            }
        } catch(e) { 
            console.error("Dashboard load error:", e); 
        }
    }

    function updateSyncBadge(d1Data, d2Data) {
        const badge = document.getElementById('syncBadge');
        if (d1Data && d2Data) { badge.textContent = "● DUAL SYNC"; badge.className = "sync-badge online"; }
        else if (d1Data || d2Data) { badge.textContent = "● PARTIAL"; badge.className = "sync-badge waiting"; }
        else { badge.textContent = "● OFFLINE"; badge.className = "sync-badge offline"; }
    }

    function updateStats() {
        const registry = sharedData.registry || {};
        const keys = Object.keys(registry);
        let wantedCount = 0, clearCount = 0;
        keys.forEach(key => { if (registry[key].status === 'WANTED') wantedCount++; else if (registry[key].status === 'CLEAR') clearCount++; });
        document.getElementById('statTotal').textContent = keys.length;
        document.getElementById('statWanted').textContent = wantedCount;
        document.getElementById('statClear').textContent = clearCount;
        document.getElementById('statInmates').textContent = (sharedData.activeInmates || []).length;
        document.getElementById('statRevenue').textContent = '$' + (sharedData.revenue || 0);
        document.getElementById('statValidations').textContent = sharedData.valids || 0;
    }

    function getSourceTag(source) {
        if (!source) return '';
        let cls = 'src-db', label = source;
        if (source.includes('D1') || source.includes('ENFORCEMENT')) { cls = 'src-d1'; label = 'D1'; }
        else if (source.includes('TOLL') || source.includes('NHAI_TOLL')) { cls = 'src-d2'; label = 'TOLL'; }
        else if (source.includes('D7') || source.includes('PRISON') || source.includes('PAROLE')) { cls = 'src-d7'; label = 'D7'; }
        else if (source.includes('DB_TERMINAL')) { cls = 'src-db'; label = 'DB'; }
        
        const span = document.createElement('span');
        span.className = `source-tag ${cls}`;
        span.textContent = label;
        return span;
    }

    function renderDashboard() {
        const listContainer = document.getElementById('db-list');
        listContainer.innerHTML = '';
        const registry = sharedData.registry || {};
        let keys = Object.keys(registry);
        const filterSearch = (document.getElementById('searchInput').value || '').toUpperCase().trim();
        
        if (filterSearch) { 
            keys = keys.filter(k => k.includes(filterSearch) || (registry[k].id || '').includes(filterSearch)); 
        }
        document.getElementById('recordCount').textContent = `${keys.length} RECORDS`;

        if (keys.length === 0) {
            listContainer.innerHTML = `<div class="empty-state"><div style="font-size: 2rem; margin-bottom: 10px; opacity: 0.3;">⊘</div><div style="font-size: 0.9rem; margin-bottom: 6px;">NO MATCHING RECORDS</div><div style="font-size: 0.7rem; color: #444;">Adjust search or register citizens via the terminal.</div></div>`;
            return;
        }
        
        keys.sort((a, b) => { 
            const aW = registry[a].status === 'WANTED' ? 0 : 1; 
            const bW = registry[b].status === 'WANTED' ? 0 : 1; 
            if (aW !== bW) return aW - bW; 
            return a.localeCompare(b); 
        });

        keys.forEach(plate => {
            const record = registry[plate];
            let statusClass = 'status-clear';
            if (record.status === 'WANTED') statusClass = 'status-wanted';
            else if (record.status === 'PENDING_ENFORCEMENT') statusClass = 'status-pending';
            
            const sourceTag = getSourceTag(record.registeredBy);
            const plateClass = record.status === 'WANTED' ? 'plate-tag wanted' : 'plate-tag';
            
            // SECURITY FIX: Create elements natively instead of innerHTML to prevent DOM XSS
            const item = document.createElement('div'); 
            item.className = 'table-row';
            
            const col1 = document.createElement('div');
            const plateDiv = document.createElement('div');
            plateDiv.className = plateClass;
            plateDiv.textContent = plate; // Safe text injection
            col1.appendChild(plateDiv);
            col1.appendChild(sourceTag);
            
            const col2 = document.createElement('div');
            col2.textContent = record.id || 'N/A';
            
            const col3 = document.createElement('div');
            col3.style.color = "#888";
            col3.textContent = record.vClass || 'N/A';
            
            const col4 = document.createElement('div');
            const statusDiv = document.createElement('div');
            statusDiv.className = `status-tag ${statusClass}`;
            statusDiv.textContent = record.status;
            col4.appendChild(statusDiv);
            
            item.appendChild(col1);
            item.appendChild(col2);
            item.appendChild(col3);
            item.appendChild(col4);
            
            listContainer.appendChild(item);
        });
    }

    function manualSync() {
        playSyncSound(); 
        lastRegistryHash = ''; 
        loadData();
        const btn = document.getElementById('syncBtn');
        if (btn) { 
            btn.style.transform = 'translateY(3px)'; 
            btn.style.boxShadow = '0 1px 0 #000'; 
            setTimeout(() => { 
                btn.style.transform = 'translateY(0)'; 
                btn.style.boxShadow = '0 4px 0 #000'; 
            }, 150); 
        }
    }

    // Event Listeners (No inline HTML JS)
    document.getElementById('searchInput').addEventListener('input', renderDashboard);
    document.getElementById('syncBtn').addEventListener('click', manualSync);

    // Real-time cross-tab sync with debouncing to prevent errors from rapid writes
    window.addEventListener('storage', (event) => { 
        if (event.key === LS_D1_KEY || event.key === LS_D2_KEY) { 
            debounceLoadData(); 
        } 
    });

    // Initial Load & Polling
    loadData(); 
    setInterval(loadData, 4000); // Slightly lowered frequency since debounce handles real-time properly
</script>
</body>
</html>
