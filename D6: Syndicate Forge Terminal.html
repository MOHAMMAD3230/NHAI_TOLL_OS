<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" href="https://mohammad3230.github.io/PROJECT/favicon.png" type="image/png" sizes="32x32" />
<script async src="https://www.googletagmanager.com/gtag/js?id=GT-NC6T5LRJ"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'GT-NC6T5LRJ');

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SYNDICATE FORGE - v6.0</title>
<style>
    :root { --bg: #0a0508; --panel: #1a1015; --accent: #ff0044; --success: #2ed573; --danger: #ff4757; --warning: #ffa502; --border: #3a1a2a; --neon: #ff0044; }
    body { background-color: var(--bg); color: #ccc; font-family: 'Courier New', monospace; margin: 0; height: 100vh; display: flex; flex-direction: column; }
    .top-bar { background: #000; padding: 12px 20px; border-bottom: 2px solid var(--accent); display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
    .top-bar h1 { margin: 0; font-size: 0.9rem; color: var(--accent); letter-spacing: 1px; text-shadow: 0 0 10px rgba(255,0,68,0.5); }
    .top-bar .time { color: var(--warning); font-size: 0.8rem; }
    .main-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; flex-grow: 1; min-height: 0; }
    .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 4px; padding: 15px; display: flex; flex-direction: column; overflow-y: auto; }
    .panel-title { color: var(--accent); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; border-bottom: 1px solid var(--border); padding-bottom: 8px; flex-shrink: 0; }
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; font-size: 0.7rem; color: #888; margin-bottom: 6px; text-transform: uppercase; }
    .form-group input { width: 100%; background: #000; border: 1px solid var(--border); color: var(--warning); padding: 12px; box-sizing: border-box; font-family: monospace; font-size: 1rem; outline: none; }
    .form-group input:focus { border-color: var(--accent); box-shadow: 0 0 10px rgba(255,0,68,0.2); }
    .system-alert { color: #555; font-size: 0.75rem; margin-bottom: 15px; border-left: 3px solid var(--accent); padding-left: 10px; flex-shrink: 0; }
    .forge-btn { width: 100%; padding: 12px; background: linear-gradient(145deg, #ff0044, #99002a); border: 2px solid #000; color: #fff; font-weight: bold; text-transform: uppercase; font-size: 0.9rem; cursor: pointer; font-family: monospace; letter-spacing: 2px; box-shadow: 0 4px #330011; transition: all 0.1s; margin-top: auto; flex-shrink: 0; }
    .forge-btn:active { transform: translateY(3px); box-shadow: 0 1px #330011; }
    .active-forge-list { flex-grow: 1; overflow-y: auto; margin-top: 10px; padding-right: 5px; min-height: 0; }
    .forge-item { background: #000; border: 1px solid var(--border); padding: 12px; margin-bottom: 8px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 0.8rem; }
    .forge-tag { color: var(--accent); font-weight: bold; }
    .clean-tag { color: var(--success); font-weight: bold; }
    .active-forge-list::-webkit-scrollbar { width: 6px; }
    .active-forge-list::-webkit-scrollbar-track { background: #000; border: 1px solid var(--border); }
    .active-forge-list::-webkit-scrollbar-thumb { background: var(--accent); border: 1px solid #000; }
    @media (max-width: 1024px) { .main-layout { grid-template-columns: 1fr; } }
    @media (max-width: 600px) { .top-bar h1 { font-size: 0.7rem; } .forge-item { grid-template-columns: 1fr; } .forge-item div:nth-child(2), .forge-item div:nth-child(4) { border-top: 1px dashed var(--border); padding-top: 6px; margin-top: 4px; } }
</style>
</head>
<body>
<div class="top-bar">
    <h1>▸ SYNDICATE_FORGE // DOCUMENT_ALTERATION_v6.0</h1>
    <div class="time" id="clock">00:00:00</div>
</div>
<div class="main-layout">
    <div class="panel">
        <div class="panel-title">■ Identity Fabrication</div>
        <div class="system-alert">SYSTEM ALERT: Input the target's real APB plate, then assign a clean alias. The system will inject this into the Enforcement Database.</div>
        <div class="form-group"><label>Target Real Plate (APB/WANTED)</label><input type="text" id="inp-real-plate" placeholder="e.g. CR-8800"></div>
        <div class="form-group"><label>Fake Alias Plate (Clean Cover)</label><input type="text" id="inp-fake-plate" placeholder="e.g. TX-1234"></div>
        <div class="form-group"><label>Fake Driver License ID</label><input type="text" id="inp-fake-id" placeholder="e.g. DL-FAKE-9981"></div>
        <button class="forge-btn" onclick="forgeIdentity()">INJECT INTO NETWORK</button>
    </div>
    <div class="panel">
        <div class="panel-title">■ Active Forged Aliases</div>
        <div class="active-forge-list" id="forge-list"><div style="color:#555; text-align:center; padding:20px;">NO FORGED IDENTITIES ACTIVE</div></div>
    </div>
</div>
<script>
    let sharedData = { revenue: 0, valids: 0, missed: 0, level: 1, rankPoints: 0, history: [], registry: {}, forgedAliases: {}, nextSpawnOverride: null, activeInmates: [], releasedInmates: [], ledgerCashouts: [], intelFlags: [], paroleRecords: [], iaViolations: [], rehabPrograms: [] };
    function updateClock() { document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB'); } setInterval(updateClock, 1000);
    const LS_D1_KEY = 'enforcementTerminalV23_D1'; const LS_D2_KEY = 'enforcementTerminalV23_TOLL';
    function deepMerge(target, source) { for (const key in source) { if (source[key] instanceof Array) { target[key] = source[key]; } else if (source[key] instanceof Object && target[key] instanceof Object) { deepMerge(target[key], source[key]); } else { target[key] = source[key]; } } return target; }
    function loadData() {
        try { const d1 = localStorage.getItem(LS_D1_KEY); const d2 = localStorage.getItem(LS_D2_KEY); sharedData = { registry: {}, history: [] };
            if (d1) { const p = JSON.parse(d1); deepMerge(sharedData, p); if(p.registry) Object.assign(sharedData.registry, p.registry); }
            if (d2) { const p = JSON.parse(d2); deepMerge(sharedData, p); if(p.registry) Object.assign(sharedData.registry, p.registry); if(p.history) sharedData.history = p.history.concat(sharedData.history).filter((v, i, a) => a.findIndex(t => (t.plate === v.plate && t.timestamp === v.timestamp)) === i); }
            if(!sharedData.registry) sharedData.registry = {}; if(!sharedData.forgedAliases) sharedData.forgedAliases = {}; if(sharedData.nextSpawnOverride === undefined) sharedData.nextSpawnOverride = null; if(!sharedData.history) sharedData.history = [];
        } catch(e) {} renderForgeList();
    }
    function saveData() { try { const d = JSON.stringify(sharedData); localStorage.setItem(LS_D1_KEY, d); localStorage.setItem(LS_D2_KEY, d); } catch(e) {} }
    function forgeIdentity() {
        const realPlate = document.getElementById('inp-real-plate').value.toUpperCase().trim(); const fakePlate = document.getElementById('inp-fake-plate').value.toUpperCase().trim(); const fakeId = document.getElementById('inp-fake-id').value.toUpperCase().trim();
        if (!realPlate || !fakePlate || !fakeId) { alert("ERROR: All fields are required for forgery."); return; }
        loadData(); const d5Score = 70 + Math.floor(Math.random() * 31);
        sharedData.registry[fakePlate] = { id: fakeId, vClass: "LVM_CLASS_1", status: "CLEAR", registeredBy: "SYNDICATE_FORGE", d5Status: "APPROVED", d5Score: d5Score };
        sharedData.forgedAliases[fakePlate] = { realPlate: realPlate, fakeId: fakeId, timeActivated: new Date().toLocaleTimeString('en-GB') };
        saveData(); renderForgeList(); document.getElementById('inp-real-plate').value = ''; document.getElementById('inp-fake-plate').value = ''; document.getElementById('inp-fake-id').value = '';
    }
    function burnIdentity(fakePlate) { loadData(); if (sharedData.registry[fakePlate]) delete sharedData.registry[fakePlate]; if (sharedData.forgedAliases[fakePlate]) delete sharedData.forgedAliases[fakePlate]; saveData(); renderForgeList(); }
    function renderForgeList() {
        const listContainer = document.getElementById('forge-list'); listContainer.innerHTML = ''; const aliases = sharedData.forgedAliases || {}; const keys = Object.keys(aliases);
        if (keys.length === 0) { listContainer.innerHTML = '<div style="color:#555; text-align:center; padding:20px;">NO FORGED IDENTITIES ACTIVE</div>'; return; }
        keys.forEach(fakePlate => {
            const record = aliases[fakePlate]; const item = document.createElement('div'); item.className = 'forge-item';
            item.innerHTML = `<div>REAL PLATE:<br><span class="forge-tag">${record.realPlate}</span></div><div>FAKE ALIAS:<br><span class="clean-tag">${fakePlate}</span></div><div>FAKE ID:<br>${record.fakeId}</div><div style="display:flex; align-items:center; justify-content:space-between;"><div style="font-size:0.7rem; color:#555;">${record.timeActivated}</div><button class="forge-btn" style="padding:4px 8px; font-size:0.6rem; margin:0; width:auto;" onclick="burnIdentity('${fakePlate}')">BURN</button></div>`;
            listContainer.appendChild(item);
        });
    }
    loadData(); setInterval(loadData, 2000);
</script>
</body>
</html>
